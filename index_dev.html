<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-16">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>출하 현황 조회</title>
  <style>
    *{box-sizing:border-box}

    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:#f3f5f8;color:#1f2937}
    .app{max-width:1600px;margin:0 auto;min-height:100vh;background:#f3f5f8}
    .header{position:static;z-index:auto;background:#f3f5f8;padding:14px 14px 10px;border-bottom:1px solid #e5e7eb}
    .header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .header-title-wrap{min-width:0}
    .header-user{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .title{font-size:20px;font-weight:800;margin:0 0 4px;overflow:hidden;text-overflow:ellipsis}
    .subtitle{margin:0;font-size:13px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .page-meta-bar{margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .page-meta-chip,.user-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #e5e7eb;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;color:#374151}
    .logout-btn{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:999px;padding:6px 11px;font-size:12px;font-weight:800;cursor:pointer}
    .admin-btn{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}

    .user-menu-wrap{position:relative}
    .user-menu-toggle{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:999px;padding:6px 11px;font-size:12px;font-weight:800;cursor:pointer}
    .user-menu-panel{position:absolute;right:0;top:calc(100% + 8px);min-width:220px;background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 12px 30px rgba(15,23,42,.12);padding:8px;display:grid;gap:6px}
    .user-menu-item{border:1px solid transparent;background:#fff;border-radius:10px;padding:10px 12px;text-align:left;font-size:13px;font-weight:800;color:#374151;cursor:pointer}
    .user-menu-item:hover{background:#f8fafc;border-color:#e5e7eb}
    .user-menu-group-title{padding:8px 12px 4px;font-size:11px;font-weight:900;color:#94a3b8;letter-spacing:.04em}
    .user-menu-divider{height:1px;background:#e5e7eb;margin:4px 0}

    .auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:36px 14px}
    .auth-card{width:100%;max-width:420px;background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:22px;box-shadow:0 8px 24px rgba(15,23,42,.08)}
    .auth-title{font-size:22px;font-weight:900;color:#111827;margin-bottom:4px}
    .auth-subtitle{font-size:13px;color:#6b7280;margin-bottom:16px;line-height:1.5}
    .auth-label{display:block;font-size:12px;font-weight:800;color:#6b7280;margin:10px 0 6px}
    .auth-input{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:12px 13px;font-size:14px;background:#fff}
    .auth-btn{width:100%;margin-top:14px;border:0;background:#111827;color:#fff;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:800;cursor:pointer}
    .auth-btn:disabled{opacity:.6;cursor:default}
    .auth-msg{margin-top:10px;font-size:13px;line-height:1.5;min-height:20px;color:#b91c1c;font-weight:700}


    .public-notice-card{width:100%;max-width:620px;background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(15,23,42,.06)}
    .public-notice-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .public-notice-title{font-size:15px;font-weight:900;color:#111827}
    .public-notice-more{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;cursor:pointer}
    .public-notice-list{display:grid;gap:8px}
    .public-notice-item{border:1px solid #eef2f7;background:#fafbfc;border-radius:12px;padding:10px 12px}
    .public-notice-item-title{font-size:13px;font-weight:900;color:#111827;margin-bottom:4px;word-break:break-word}
    .public-notice-item-meta{font-size:11px;font-weight:700;color:#6b7280;margin-bottom:6px}
    .public-notice-item-body{font-size:12px;font-weight:700;color:#374151;line-height:1.45;white-space:pre-wrap;word-break:break-word}
    .notice-wrap{display:grid;gap:12px}
    .notice-admin-form{display:grid;gap:10px;border:1px solid #e5e7eb;background:#fff;border-radius:14px;padding:14px}
    .notice-field{display:grid;gap:6px}
    .notice-label{font-size:12px;font-weight:800;color:#6b7280}
    .notice-input,.notice-textarea{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:10px 11px;font-size:13px;background:#fff;color:#111827}
    .notice-textarea{min-height:90px;resize:vertical;line-height:1.5}
    .notice-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .notice-btn{border:1px solid #111827;background:#111827;color:#fff;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:800;cursor:pointer}
    .notice-btn.secondary{border-color:#d1d5db;background:#fff;color:#374151}
    .notice-msg{font-size:12px;font-weight:700;min-height:18px;color:#b91c1c}
    .notice-list{display:grid;gap:8px}
    .notice-card{border:1px solid #e5e7eb;background:#fff;border-radius:14px;padding:12px}
    .notice-card-title{font-size:14px;font-weight:900;color:#111827;margin-bottom:4px;word-break:break-word}
    .notice-card-meta{font-size:11px;font-weight:700;color:#6b7280;margin-bottom:8px}
    .notice-card-body{font-size:13px;font-weight:700;color:#374151;line-height:1.5;white-space:pre-wrap;word-break:break-word}
    .summary-depart-box{display:inline-flex;align-items:center;gap:8px;margin-top:8px;margin-bottom:4px;padding:7px 10px;border-radius:10px;background:#fff8db;border:1px solid #fde68a}
    .summary-depart-label{font-size:11px;font-weight:900;color:#92400e}
    .summary-depart-value{font-size:14px;font-weight:900;color:#111827}

    .summary{display:none}
    .summary-card{background:#fff;border-radius:14px;padding:10px 10px;box-shadow:0 4px 14px rgba(15,23,42,.06);text-align:center;height:100%;display:flex;flex-direction:column;justify-content:center}
    .summary-label{font-size:11px;color:#6b7280;margin-bottom:6px}
    .summary-value{font-size:20px;font-weight:800}

    .controls{padding:12px 14px;display:grid;gap:10px}
    .top-layout{display:grid;grid-template-columns:minmax(320px,1fr) minmax(220px,280px);gap:24px;align-items:start}
    .top-left-area{display:grid;gap:10px;justify-items:start;align-content:start}
    .top-right-area{display:grid;gap:10px;justify-items:end;align-content:start}
    .summary-inline{width:220px;min-width:220px}
    .search-wrap{display:flex;justify-content:flex-end;width:100%}
    .search-wrap.open-filter{justify-content:stretch}
    .search{width:460px;max-width:100%;border:1px solid #d1d5db;border-radius:14px;padding:13px 14px;font-size:15px;background:#fff}
    .tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;flex-wrap:wrap}
    .tab{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:999px;padding:10px 14px;font-size:14px;font-weight:700;white-space:nowrap;cursor:pointer;flex:0 0 auto}
    .tab.active{background:#111827;color:#fff;border-color:#111827}
    .filter-toggle-row{display:flex;justify-content:flex-start}
    .filter-toggle-btn{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:800;cursor:pointer}
    .advanced-filters{display:grid;gap:10px}
    .filter-block{display:grid;gap:6px}
    .filter-block-title{font-size:12px;font-weight:800;color:#6b7280;padding:0 2px}
    .date-action-row{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap;width:100%}
    .date-action-row.inside-filter{justify-content:flex-start}
    .date-range{display:flex;align-items:center;gap:8px;flex:1;min-width:280px}
    .date-range.compact{flex:0 1 460px;min-width:0}
    .date-input{border:1px solid #d1d5db;border-radius:10px;padding:9px 10px;font-size:14px;background:#fff;color:#374151;flex:1;min-width:0}
    .date-sep{color:#9ca3af;font-weight:700;flex:0 0 auto}
    .date-reset{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
    .hidden{display:none !important}
    .loading{background:#fff;border-radius:16px;padding:24px 18px;text-align:center;color:#374151;box-shadow:0 4px 14px rgba(15,23,42,.06);font-weight:800}
    .empty{background:#fff;border-radius:16px;padding:32px 18px;text-align:center;color:#6b7280;box-shadow:0 4px 14px rgba(15,23,42,.06)}

    .list,.report{padding:0 14px 18px}
    .report{display:grid;gap:16px}

    .item{background:#fff;border-radius:16px;margin-bottom:10px;box-shadow:0 4px 14px rgba(15,23,42,.06);overflow:hidden;border:1px solid #eef2f7}
    .item-head{width:100%;border:0;background:#fff;padding:14px;text-align:left;cursor:pointer}
    .top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .badge-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
    .corp-badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800}
    .corp-psk{background:#dbeafe;color:#1d4ed8}
    .corp-holdings{background:#fef3c7;color:#b45309}
    .mode-badge{display:inline-block;background:#ede9fe;color:#6d28d9;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800}
    .summary-line{display:flex;align-items:center;gap:10px;min-width:0;flex:1;flex-wrap:wrap}
    .summary-wo{font-size:15px;font-weight:900;color:#111827;flex:0 0 auto}
    .arrow{font-size:18px;color:#9ca3af;transition:transform .2s ease;flex:0 0 auto}
    .summary-main{min-width:0;flex:1}
    .summary-main *{word-break:break-word}
    .summary-subline{font-size:13px;color:#4b5563;font-weight:700;margin-top:2px}
    .summary-model-line{font-size:14px;color:#111827;font-weight:800;margin-top:4px}
    .item.open .arrow{transform:rotate(180deg)}
    .detail{display:none;border-top:1px solid #eef2f7;background:#fafbfc;padding:12px 14px 14px}
    .item.open .detail{display:block}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
    .field{min-width:0}
    .field-label{font-size:11px;color:#6b7280;margin-bottom:3px;font-weight:700}
    .field-value{font-size:13px;color:#111827;font-weight:700;word-break:break-word;line-height:1.4}

    .list-day-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border-radius:16px;padding:10px 12px;margin-bottom:12px;box-shadow:0 4px 14px rgba(15,23,42,.06);border:1px solid #eef2f7}
    .list-day-nav-main{display:grid;gap:2px;min-width:0;flex:1;text-align:center}
    .list-day-title{font-size:18px;font-weight:900;color:#111827}
    .list-day-sub{font-size:12px;color:#6b7280;font-weight:700}
    .list-day-btn{width:40px;height:40px;border:1px solid #d1d5db;background:#fff;border-radius:999px;font-size:18px;font-weight:900;color:#374151;cursor:pointer;flex:0 0 auto}
    .list-day-btn:disabled{opacity:.35;cursor:default}

    .calendar-toolbar{display:flex;align-items:center;justify-content:space-between;padding:0 14px 10px;gap:10px}
    .calendar-title{font-size:18px;font-weight:800;color:#111827}
    .nav-btn{border:1px solid #d1d5db;background:#fff;border-radius:10px;padding:8px 12px;font-size:14px;font-weight:800;cursor:pointer}
    .calendar-wrap{padding:0 14px 18px;display:grid;grid-template-columns:minmax(0,1.6fr) minmax(360px,.9fr);gap:16px;align-items:start}
    .calendar{display:grid;gap:12px}
    .cal-week-block{display:block}
    .cal-week-grid{display:grid;gap:8px;max-width:none;width:100%;margin:0}
    .cal-weekday{background:#e5e7eb;color:#374151;border-radius:10px;padding:10px 4px;text-align:center;font-size:12px;font-weight:800;min-width:0}
    .cal-cell{background:#fff;border:1px solid #e5e7eb;border-radius:14px;min-height:108px;padding:8px;display:flex;flex-direction:column;gap:6px;cursor:pointer;box-shadow:0 4px 14px rgba(15,23,42,.04);min-width:0;overflow:hidden}
    .cal-cell.empty{background:transparent;border:0;box-shadow:none;cursor:default}
    .cal-cell.selected{border:2px solid #111827}
    .cal-day{font-size:13px;font-weight:800;color:#111827}
    .cal-count{font-size:12px;font-weight:700;color:#2563eb}
    .cal-items{display:flex;flex-direction:column;gap:4px;min-width:0;overflow:hidden}
    .cal-item{background:#f3f4f6;border-radius:8px;padding:4px 6px;font-size:11px;font-weight:700;color:#374151;white-space:normal;word-break:break-word;overflow-wrap:anywhere;line-height:1.25;min-width:0;overflow:hidden}
    .calendar-day-panel{background:#fff;border-radius:16px;padding:14px;box-shadow:0 4px 14px rgba(15,23,42,.06);border:1px solid #eef2f7;position:sticky;top:88px;max-height:calc(100vh - 110px);overflow:auto}
    .day-panel-title{font-size:15px;font-weight:800;margin-bottom:10px;color:#111827}
    .day-list{display:grid;gap:8px}
    .day-card{border:1px solid #e5e7eb;background:#fafafa;border-radius:12px;padding:10px;cursor:pointer}
    .day-card.alert{background:#fff2cc;border-color:#e69138}
    .day-card-title{font-size:13px;font-weight:800;color:#111827;margin-bottom:4px}
    .day-card-sub{font-size:12px;color:#6b7280;font-weight:700}

    .report-corp{display:grid;gap:10px}
    .report-corp-title{font-size:18px;font-weight:900;color:#111827;padding:4px 2px}
    .report-block{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e5e7eb;box-shadow:0 4px 14px rgba(15,23,42,.05)}
    .report-block-title{padding:10px 12px;font-size:14px;font-weight:900;background:#f8fafc;border-bottom:1px solid #e5e7eb}
    .report-table-wrap{overflow:auto}
    .report-table{width:max-content;min-width:100%;border-collapse:collapse;font-size:12px;background:#fff}
    .report-table th,.report-table td{border:1px solid #d1d5db;padding:6px 8px;text-align:left;vertical-align:top;white-space:nowrap}
    .report-table th{background:#5b8fd1;color:#fff;font-weight:800;position:sticky;top:0}
    .report-table td.col-date,.report-table td.col-wo{color:#111827;font-weight:400}
    .report-table td.col-date.merged{background:#f8fbff;font-weight:700;vertical-align:middle}
    .report-table td.col-export.transfer{background:#fff59d;font-weight:800}
    .report-table td.col-inv.has-inv{background:#92d050;font-weight:800}
    .report-table tr.row-alert td{background:#fff2cc !important;color:#111827}
    .report-table tr.row-alert td.col-date.merged{background:#fff2cc !important}

    .modal{position:fixed;inset:0;z-index:1000}
    .modal-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.45)}
    .modal-content{position:relative;max-width:760px;margin:5vh auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.25);max-height:90vh;display:flex;flex-direction:column}
    .modal-content.wide{max-width:1100px}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e5e7eb}
    .modal-title{font-size:16px;font-weight:900;color:#111827}
    .modal-close{border:0;background:#fff;font-size:26px;line-height:1;cursor:pointer;color:#6b7280}
    .modal-body{padding:14px 16px;overflow:auto;background:#fafbfc}

    .admin-ip-wrap{display:grid;gap:14px}
    .admin-ip-group{border:1px solid #e5e7eb;background:#fff;border-radius:14px;overflow:hidden}
    .admin-ip-group-head{padding:12px 14px;background:#f8fafc;border-bottom:1px solid #e5e7eb}
    .admin-ip-group-head.is-alert{background:#fff7ed;border-bottom-color:#fdba74}
    .admin-ip-group-title{font-size:14px;font-weight:900;color:#111827}
    .admin-ip-group-meta{margin-top:4px;font-size:12px;font-weight:700;color:#6b7280}
    .admin-ip-table-wrap{overflow:auto}
    .admin-ip-table{width:100%;border-collapse:collapse;font-size:12px;background:#fff}
    .admin-ip-table th,.admin-ip-table td{border:1px solid #e5e7eb;padding:8px 10px;text-align:left;white-space:nowrap}
    .admin-ip-table th{background:#f3f4f6;color:#374151;font-weight:800}
    .admin-ip-table tr.is-alert td{background:#fff2cc;font-weight:800}

    .admin-user-layout{display:grid;gap:14px}
    .admin-user-form{display:grid;gap:10px;padding:14px;border:1px solid #e5e7eb;border-radius:14px;background:#fff}
    .admin-user-form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .admin-user-field{display:grid;gap:6px}
    .admin-user-field.full{grid-column:1/-1}
    .admin-user-label{font-size:12px;font-weight:800;color:#6b7280}
    .admin-user-input,.admin-user-select{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:10px 11px;font-size:13px;background:#fff;color:#111827}
    .admin-user-actions{display:flex;gap:8px;flex-wrap:wrap}
    .admin-user-btn{border:1px solid #111827;background:#111827;color:#fff;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:800;cursor:pointer}
    .admin-user-btn.secondary{border-color:#d1d5db;background:#fff;color:#374151}
    .admin-user-msg{font-size:12px;font-weight:700;min-height:18px;color:#b91c1c}
    .admin-user-table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:14px;background:#fff}
    .admin-user-table{width:100%;border-collapse:collapse;font-size:12px;background:#fff}
    .admin-user-table th,.admin-user-table td{border:1px solid #e5e7eb;padding:8px 10px;text-align:left;white-space:nowrap}
    .admin-user-table th{background:#f3f4f6;color:#374151;font-weight:800}
    .admin-user-badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800}
    .admin-user-badge.admin{background:#dbeafe;color:#1d4ed8}
    .admin-user-badge.user{background:#ede9fe;color:#6d28d9}
    .admin-user-badge.active{background:#dcfce7;color:#166534}
    .admin-user-badge.inactive{background:#fee2e2;color:#b91c1c}
    .admin-user-row-actions{display:flex;gap:6px;flex-wrap:wrap}
    .admin-user-action-btn{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:9px;padding:7px 9px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap}
    .admin-user-action-btn.reset{border-color:#bfdbfe;background:#eff6ff;color:#1d4ed8}
    .admin-user-action-btn.disable{border-color:#fed7aa;background:#fff7ed;color:#c2410c}
    .admin-user-action-btn.delete{border-color:#fecaca;background:#fff1f2;color:#be123c}
    .admin-user-action-btn:disabled{opacity:.45;cursor:default}

    .password-change-wrap{display:grid;gap:14px}
    .password-change-desc{font-size:12px;font-weight:700;color:#6b7280;line-height:1.45}
    .password-change-form{display:grid;gap:10px;border:1px solid #e5e7eb;background:#fff;border-radius:14px;padding:14px}
    .password-change-field{display:grid;gap:6px}
    .password-change-label{font-size:12px;font-weight:800;color:#6b7280}
    .password-change-input{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:10px 11px;font-size:13px;background:#fff;color:#111827}
    .password-change-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .password-change-btn{border:1px solid #111827;background:#111827;color:#fff;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:800;cursor:pointer}
    .password-change-msg{font-size:12px;font-weight:700;min-height:18px;color:#b91c1c}

    .notify-wrap{display:grid;gap:14px}
    .notify-section{border:1px solid #e5e7eb;background:#fff;border-radius:14px;padding:14px}
    .notify-title{font-size:14px;font-weight:900;color:#111827;margin-bottom:8px}
    .notify-desc{font-size:12px;font-weight:700;color:#6b7280;line-height:1.45;margin-bottom:10px}
    .notify-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .notify-input{flex:1;min-width:240px;border:1px solid #d1d5db;border-radius:10px;padding:10px 11px;font-size:13px;background:#fff;color:#111827}
    .notify-btn{border:1px solid #111827;background:#111827;color:#fff;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:800;cursor:pointer}
    .notify-btn.secondary{border-color:#d1d5db;background:#fff;color:#374151}
    .notify-msg{font-size:12px;font-weight:700;min-height:18px;color:#b91c1c;margin-top:8px}
    .notify-email-list{display:grid;gap:8px;margin-top:12px}

<body>
  <div style="position:sticky;top:0;z-index:99999;background:#b00020;color:#ffffff;font-size:28px;font-weight:700;text-align:center;padding:16px 12px;letter-spacing:1px;border-bottom:4px solid #7a0016;box-shadow:0 2px 8px rgba(0,0,0,0.25);">DEV TEST PAGE</div>
  <div class="app">

  <script>
    const API_BASE = "https://psk-shipment-api-dev.ms1743.workers.dev";
    const FIXED_NOTIFICATION_TARGETS = ["PSK HQ","2사업장","SENT","SAM","ASEM","이지스","나우테크"];
    const LOGIN_STORAGE_KEY = "PSK_SHIPMENT_AUTH_TOKEN";

    let appData = [];
    let pageMeta = { updatedAt: "-", itemCount: 0, mode: "current" };
    let currentUser = null;
    let snapshotList = [];
    let selectedSnapshot = null;

    const now = new Date();
    const state = {
      corp: "전체 법인",
      mode: "전체",
      filter: "전체",
      keyword: "",
      dateFrom: "",
      dateTo: "",
      view: "list",
      calendarYear: now.getFullYear(),
      calendarMonth: now.getMonth(),
      selectedDate: "",
      listDate: "",
      advancedOpen: false,
      dataMode: "current",
      snapshotsLoaded: false
    };

    const $ = id => document.getElementById(id);

    const authWrap = $("authWrap");
    const appShell = $("appShell");
    const authMsg = $("authMsg");
    const loginUsername = $("loginUsername");
    const loginPassword = $("loginPassword");
    const loginBtn = $("loginBtn");
    const headerUser = $("headerUser");

    const viewTabs = $("viewTabs");
    const corpTabs = $("corpTabs");
    const modeTabs = $("modeTabs");
    const filterTabs = $("filterTabs");

    const listEl = $("list");
    const summaryEl = $("summary");
    const summaryInlineEl = $("summaryInline");
    const searchInput = $("searchInput");
    const dateFromEl = $("dateFrom");
    const dateToEl = $("dateTo");
    const dateResetEl = $("dateReset");
    const toggleAdvancedFiltersBtn = $("toggleAdvancedFilters");
    const advancedFiltersEl = $("advancedFilters");

    const calToolbar = $("calendarToolbar");
    const calWrap = $("calendarWrap");
    const calEl = $("calendar");
    const calTitleEl = $("calendarTitle");
    const calDayPanel = $("calendarDayPanel");
    const reportEl = $("reportView");
    const snapshotEl = $("snapshotView");
    const pageMetaBarEl = $("pageMetaBar");

    const detailModal = $("detailModal");
    const modalBackdrop = $("modalBackdrop");
    const modalClose = $("modalClose");
    const modalBody = $("modalBody");
    const modalTitleEl = $("modalTitle");

    const notificationModal = $("notificationModal");
    const notificationModalBackdrop = $("notificationModalBackdrop");
    const notificationModalClose = $("notificationModalClose");
    const notificationModalBody = $("notificationModalBody");

    const noticeModal = $("noticeModal");
    const noticeModalBackdrop = $("noticeModalBackdrop");
    const noticeModalClose = $("noticeModalClose");
    const noticeModalBody = $("noticeModalBody");
    const publicNoticeList = $("publicNoticeList");
    const publicNoticeMoreBtn = $("publicNoticeMoreBtn");

    const adminNotificationModal = $("adminNotificationModal");
    const adminNotificationModalBackdrop = $("adminNotificationModalBackdrop");
    const adminNotificationModalClose = $("adminNotificationModalClose");
    const adminNotificationModalBody = $("adminNotificationModalBody");

    const adminIpModal = $("adminIpModal");
    const adminIpModalBackdrop = $("adminIpModalBackdrop");
    const adminIpModalClose = $("adminIpModalClose");
    const adminIpModalBody = $("adminIpModalBody");

    const adminUserModal = $("adminUserModal");
    const adminUserModalBackdrop = $("adminUserModalBackdrop");
    const adminUserModalClose = $("adminUserModalClose");
    const adminUserModalBody = $("adminUserModalBody");

    const passwordChangeModal = $("passwordChangeModal");
    const passwordChangeModalBackdrop = $("passwordChangeModalBackdrop");
    const passwordChangeModalClose = $("passwordChangeModalClose");
    const passwordChangeModalBody = $("passwordChangeModalBody");

    const corpOptions = ["전체 법인", "PSK", "PSK Holdings"];
    const modeOptions = ["전체", "내수", "항공", "해상", "이관", "기타"];
    const viewOptions = [
      { label: "캘린더", value: "calendar" },
      { label: "요약", value: "report" },
      { label: "상세내용", value: "list" },
      { label: "이력 조회", value: "snapshot" }
    ];
    const categorySet = new Set(["전체", "본사(HQ)", "2사업장", "기타"]);
    const reportCorpOrder = ["PSK", "PSK Holdings"];
    const reportDepartOrder = ["PSK HQ", "2사업장", "조립업체", "기타"];

    const esc = v => String(v ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");

    const field = (label, val, full) =>
      `<div class="field"${full ? ' style="grid-column:1/-1"' : ""}><div class="field-label">${esc(label)}</div><div class="field-value">${esc(val || "-")}</div></div>`;

    const showVal = v => String(v ?? "").trim() || "-";
    const getToken = () => localStorage.getItem(LOGIN_STORAGE_KEY) || "";
    const setToken = v => localStorage.setItem(LOGIN_STORAGE_KEY, v || "");
    const clearToken = () => localStorage.removeItem(LOGIN_STORAGE_KEY);

    function getFixedTargets() {
      const base = Array.isArray(FIXED_NOTIFICATION_TARGETS) ? FIXED_NOTIFICATION_TARGETS.slice() : [];
      const defaults = ["PSK HQ", "2사업장", "SENT", "SAM", "ASEM", "이지스", "나우테크"];
      return Array.from(new Set([].concat(base, defaults).filter(Boolean).map(v => String(v).trim()).filter(Boolean))).sort();
    }

    function getFilterOptions() {
      return ["전체", "본사(HQ)", "2사업장", "기타", ...[...new Set(appData.map(d => d.vendorName).filter(Boolean))].sort()];
    }

    function setAuthMessage(msg, isError) {
      authMsg.textContent = msg || "";
      authMsg.style.color = isError === false ? "#15803d" : "#b91c1c";
    }

    function buildHeaders(withJson, withAuth) {
      const h = {};
      if (withJson) h["Content-Type"] = "application/json";
      if (withAuth && getToken()) h["Authorization"] = "Bearer " + getToken();
      return h;
    }

    async function apiRequest(path, options, needAuth) {
      const opt = options || {};
      const res = await fetch(API_BASE + path, {
        method: opt.method || "GET",
        headers: Object.assign(buildHeaders(opt.withJson, needAuth), opt.headers || {}),
        body: opt.body || null
      });
      const data = await res.json().catch(() => ({ ok: false, message: "invalid json" }));
      if (!res.ok) {
        const err = new Error(data && data.message ? data.message : "request failed");
        err.status = res.status;
        err.data = data;
        throw err;
      }
      return data;
    }

    function toKstDisplay(v) {
      const raw = String(v || "").trim();
      if (!raw) return "-";

      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return raw;

      const parts = new Intl.DateTimeFormat("ko-KR", {
        timeZone: "Asia/Seoul",
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(d);

      const map = {};
      parts.forEach(p => {
        if (p.type !== "literal") map[p.type] = p.value;
      });

      return `${map.month}/${map.day} ${map.hour}:${map.minute}`;
    }

    function toKstFullDisplay(v) {
      const raw = String(v || "").trim();
      if (!raw) return "-";

      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return raw;

      const parts = new Intl.DateTimeFormat("ko-KR", {
        timeZone: "Asia/Seoul",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(d);

      const map = {};
      parts.forEach(p => {
        if (p.type !== "literal") map[p.type] = p.value;
      });

      return `${map.year}-${map.month}-${map.day} ${map.hour}:${map.minute}`;
    }


    function showAuthView() {
      authWrap.classList.remove("hidden");
      appShell.classList.add("hidden");
      headerUser.innerHTML = "";
      pageMetaBarEl.innerHTML = "";
      closeDetailModal();
      closeNotificationModal();
      closeNoticeModal();
      closeAdminNotificationModal();
      closeAdminIpModal();
      closeAdminUserModal();
      closePasswordChangeModal();
    }

    function showAppView() {
      authWrap.classList.add("hidden");
      appShell.classList.remove("hidden");
      renderHeaderUser();
    }

    const isAdminUser = () => String((currentUser && currentUser.role) || "").toLowerCase() === "admin";
    const formatDateTime = v => toKstDisplay(v);
    const formatStamp = meta => esc(toKstDisplay(meta && (meta.updatedAt || meta.updatedAtIso)));

    const closeDetailModal = () => {
      detailModal.classList.add("hidden");
      modalBody.innerHTML = "";
      if (modalTitleEl) modalTitleEl.textContent = "출하 상세정보";
      document.body.style.overflow = "";
    };

    const closeNotificationModal = () => {
      notificationModal.classList.add("hidden");
      notificationModalBody.innerHTML = "";
      document.body.style.overflow = "";
    };

    const closeNoticeModal = () => {
      noticeModal.classList.add("hidden");
      noticeModalBody.innerHTML = "";
      document.body.style.overflow = "";
    };

    function normalizeShipmentPayload(payload) {
      if (payload && Array.isArray(payload.data)) return { meta: payload.meta || {}, data: payload.data };
      if (Array.isArray(payload)) return { meta: { itemCount: payload.length }, data: payload };
      if (payload && Array.isArray(payload.items)) return { meta: payload.meta || {}, data: payload.items };
      return { meta: { itemCount: 0 }, data: [] };
    }

    async function login() {
      const username = (loginUsername.value || "").trim();
      const password = loginPassword.value || "";
      if (!username || !password) {
        setAuthMessage("ID와 PW를 입력하세요.", true);
        return;
      }

      try {
        loginBtn.disabled = true;
        setAuthMessage("로그인 중...", false);
        const payload = await apiRequest("/api/auth/login", {
          method: "POST",
          withJson: true,
          body: JSON.stringify({ username, password })
        }, false);
        setToken(payload.token || "");
        currentUser = payload.user || null;
        setAuthMessage("로그인 성공", false);
        await loadCurrentShipments();
        showAppView();
        renderAll();
      } catch (err) {
        clearToken();
        currentUser = null;
        showAuthView();
        setAuthMessage(err && err.message ? err.message : "로그인 실패", true);
      } finally {
        loginBtn.disabled = false;
      }
    }

    async function checkSession() {
      const token = getToken();
      if (!token) {
        showAuthView();
        return false;
      }
      try {
        const payload = await apiRequest("/api/auth/me", { method: "GET" }, true);
        currentUser = payload.user || null;
        return true;
      } catch (err) {
        clearToken();
        currentUser = null;
        showAuthView();
        setAuthMessage("로그인이 필요합니다.", true);
        return false;
      }
    }

    async function logout() {
      try {
        if (getToken()) await apiRequest("/api/auth/logout", { method: "POST" }, true);
      } catch (err) {}
      clearToken();
      currentUser = null;
      appData = [];
      pageMeta = { updatedAt: "-", itemCount: 0, mode: "current" };
      snapshotList = [];
      selectedSnapshot = null;
      state.dataMode = "current";
      state.snapshotsLoaded = false;
      showAuthView();
      setAuthMessage("로그아웃되었습니다.", false);
    }

    async function loadCurrentShipments() {
      listEl.innerHTML = '<div class="loading">데이터 불러오는 중...</div>';
      try {
        const payload = normalizeShipmentPayload(await apiRequest("/api/current-shipments", { method: "GET" }, true));
        appData = payload.data || [];
        pageMeta = Object.assign({ updatedAt: "-", itemCount: appData.length, mode: "current" }, payload.meta || {});
        pageMeta.mode = "current";
        if (pageMeta.itemCount == null) pageMeta.itemCount = appData.length;
        selectedSnapshot = null;
        state.dataMode = "current";
      } catch (err) {
        appData = [];
        pageMeta = { updatedAt: "-", itemCount: 0, mode: "current" };
        listEl.innerHTML = `<div class="empty">조회 데이터를 불러오지 못했습니다.<br>${esc(err && err.message ? err.message : "오류")}</div>`;
        throw err;
      }
    }

    async function loadShipmentSnapshots(force) {
      if (state.snapshotsLoaded && !force) return snapshotList;
      const payload = await apiRequest("/api/shipment-snapshots?limit=200", { method: "GET" }, true);
      snapshotList = Array.isArray(payload && payload.items) ? payload.items : [];
      state.snapshotsLoaded = true;
      return snapshotList;
    }

    async function loadSnapshotData(snapshotId) {
      const id = String(snapshotId || "").trim();
      if (!id) return;

      listEl.innerHTML = '<div class="loading">업로드 이력 데이터 불러오는 중...</div>';
      const payload = normalizeShipmentPayload(await apiRequest("/api/shipment-snapshots/" + encodeURIComponent(id), { method: "GET" }, true));
      appData = payload.data || [];
      pageMeta = Object.assign({ updatedAt: "-", itemCount: appData.length, mode: "snapshot" }, payload.meta || {});
      pageMeta.mode = "snapshot";
      selectedSnapshot = pageMeta.snapshot || { snapshot_id: id, uploaded_at: pageMeta.updatedAt || "" };
      if (pageMeta.itemCount == null) pageMeta.itemCount = appData.length;
      state.dataMode = "snapshot";
      state.listDate = "";
      state.selectedDate = "";
      state.view = "list";
      renderAll();
    }

    async function returnToCurrentShipments() {
      await loadCurrentShipments();
      state.view = "list";
      state.listDate = "";
      state.selectedDate = "";
      renderAll();
    }

    const compareDateTime = (a, b) => {
      const da = (a.shipDate || "9999-99-99").trim() || "9999-99-99";
      const db = (b.shipDate || "9999-99-99").trim() || "9999-99-99";
      if (da !== db) return da.localeCompare(db);
      const ta = (a.loadTime || "").trim() || "99:99";
      const tb = (b.loadTime || "").trim() || "99:99";
      if (ta !== tb) return ta.localeCompare(tb);
      if ((a.corp || "") !== (b.corp || "")) return (a.corp || "").localeCompare(b.corp || "");
      if ((a.depart || "") !== (b.depart || "")) return (a.depart || "").localeCompare(b.depart || "");
      return (a.wo || "").localeCompare(b.wo || "");
    };

    const compareReportDateTime = (a, b) => {
      const da = (a.shipDate || "9999-99-99").trim() || "9999-99-99";
      const db = (b.shipDate || "9999-99-99").trim() || "9999-99-99";
      if (da !== db) return da.localeCompare(db);
      const ta = (a.loadTime || "").trim() || "99:99";
      const tb = (b.loadTime || "").trim() || "99:99";
      if (ta !== tb) return ta.localeCompare(tb);
      return (a.wo || "").localeCompare(b.wo || "");
    };

    const sortByLoadTime = rows => [...rows].sort((a, b) => {
      const ta = (a.loadTime || "").trim() || "99:99";
      const tb = (b.loadTime || "").trim() || "99:99";
      return ta !== tb ? ta.localeCompare(tb)
        : (a.corp || "") !== (b.corp || "") ? (a.corp || "").localeCompare(b.corp || "")
        : (a.depart || "").localeCompare(b.depart || "") || (a.wo || "").localeCompare(b.wo || "");
    });

    const openDetailModal = item => {
      if (modalTitleEl) modalTitleEl.textContent = "출하 상세정보";
      modalBody.innerHTML = renderItemDetail(item);
      detailModal.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    };

    function renderPageMetaBar() {
      if (state.dataMode === "snapshot" && selectedSnapshot) {
        const uploadedAt = selectedSnapshot.uploaded_at || pageMeta.updatedAt || "";
        const uploadedBy = selectedSnapshot.uploaded_by_username || "-";

        pageMetaBarEl.innerHTML =
          `<span class="page-meta-chip"><strong>조회 기준</strong>업로드 이력</span>` +

        `<span class="page-meta-chip"><strong>데이터 건수</strong>${esc(String(appData.length))}</span>`;

    function filteredData() {
      const kw = state.keyword.trim().toLowerCase();
      return appData.filter(item => {
        if (state.corp !== "전체 법인" && item.corp !== state.corp) return false;
        if (state.mode !== "전체" && item.shipMode !== state.mode) return false;
        if (state.filter !== "전체") {
          if (categorySet.has(state.filter) ? item.category !== state.filter : item.vendorName !== state.filter) return false;
        }
        const d = item.shipDate;
        if (state.dateFrom && d && d < state.dateFrom) return false;
        if (state.dateTo && d && d > state.dateTo) return false;
        if (kw && ![
          item.wo, item.vendorName, item.customer, item.model, item.sn, item.inv,
          item.exportInfo, item.shipType, item.shipMode, item.depart
        ].join(" ").toLowerCase().includes(kw)) return false;
        return true;
      }).sort(compareDateTime);
    }

    const ymdToDate = ymd => {
      if (!ymd) return null;
      const d = new Date(ymd + "T00:00:00");
      return Number.isNaN(d.getTime()) ? null : d;
    };

    const listDateCandidates = items => [...new Set(items.map(item => item.shipDate).filter(Boolean))].sort();

    function pickInitialListDate(items, current) {
      const dates = listDateCandidates(items);
      if (!dates.length) return "";
      if (current && dates.includes(current)) return current;
      const todayKey = new Date().toISOString().slice(0, 10);
      if (dates.includes(todayKey)) return todayKey;
      const future = dates.find(d => d >= todayKey);
      return future || dates[dates.length - 1];
    }

    function formatListDateLabel(ymd) {
      if (!ymd) return "날짜 미정";
      const base = ymdToDate(ymd);
      if (!base) return ymd;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const diff = Math.round((base - today) / 86400000);
      const md = `${base.getMonth() + 1}/${base.getDate()}`;
      if (diff === 0) return `오늘 (${md})`;
      if (diff === 1) return `내일 (${md})`;
      if (diff === -1) return `어제 (${md})`;
      return `${base.getFullYear()}-${String(base.getMonth() + 1).padStart(2, "0")}-${String(base.getDate()).padStart(2, "0")} (${md})`;
    }

    function moveListDate(items, step) {
      const dates = listDateCandidates(items);
      if (!dates.length) return;
      const current = pickInitialListDate(items, state.listDate);
      const idx = Math.max(dates.indexOf(current), 0);
      const nextIdx = Math.min(Math.max(idx + step, 0), dates.length - 1);
      state.listDate = dates[nextIdx];
      renderAll();
    }

    function renderTabs(el, options, key, onChange) {
      el.innerHTML = options.map(v =>
        `<button class="tab ${state[key] === v ? "active" : ""}" data-v="${esc(v)}" type="button">${esc(v)}</button>`
      ).join("");
      el.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => {
        onChange(btn.dataset.v);
        renderAll();
      }));
    }

    const renderViewTabs = () => {
      viewTabs.innerHTML = viewOptions.map(o =>
        `<button class="tab ${state.view === o.value ? "active" : ""}" data-v="${o.value}" type="button">${esc(o.label)}</button>`
      ).join("");
      viewTabs.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => {
        state.view = btn.dataset.v;
        renderAll();
      }));
    };

    const renderCorpTabs = () => renderTabs(corpTabs, corpOptions, "corp", v => state.corp = v);
    const renderModeTabs = () => renderTabs(modeTabs, modeOptions, "mode", v => state.mode = v);
    const renderFilterTabs = () => renderTabs(filterTabs, getFilterOptions(), "filter", v => state.filter = v);

    function getWorkLocationText(item) {
      const isEtc = item.category === "기타";
      if (item.depart === "조립업체") return item.vendorName || item.depart || "-";
      if (isEtc) return item.locationText || item.depart || "-";

    }

    function renderItemSummary(item) {

      const workDate = item.shipDateText || item.shipDate || "-";
      const workLoc = getWorkLocationText(item);
      const customerLine = [item.customer || "", corpLabel, item.shipMode || "기타"].filter(Boolean).join(" · ");
      const timeLine = item.loadTime ? "상차시간: " + item.loadTime : "상차시간: -";
      return `
        <div class="badge-row">
          <span class="${item.corp === 'PSK' ? 'corp-badge corp-psk' : 'corp-badge corp-holdings'}">${esc(corpLabel)}</span>
          <span class="mode-badge">${esc(item.shipMode || "기타")}</span>
        </div>
        <div class="top-row">
          <div class="summary-main">
            <div class="summary-line"><span class="summary-wo">${esc(item.wo || "-")}</span></div>
            <div class="summary-subline">${esc(workDate)}</div>
            <div class="summary-depart-box">
              <span class="summary-depart-label">출발지</span>
              <span class="summary-depart-value">${esc(workLoc)}</span>
            </div>
            <div class="summary-model-line">${esc(item.model || "-")}</div>
            <div class="summary-subline">${esc(customerLine || "-")}</div>
            <div class="summary-subline">${esc(timeLine)}</div>

    function renderItemDetail(item) {
      const isEtc = item.category === "기타";
      return `
        <div class="detail-grid">
          ${field("법인", item.corp)}
          ${field("구분", item.shipMode)}
          ${field("출발지", item.depart)}
          ${field("시트 구분", item.shipType)}
          ${field("출하일", item.shipDate)}
          ${field("상차시간", item.loadTime)}
          ${field("하차시간", item.unloadTime)}
          ${field("FAB OUT", item.fabOut)}
          ${field("포장예정", item.packaging)}
          ${field("사이즈 전달", item.sizeNotice)}
          ${field("출하의뢰", item.shipRequest)}
          ${field("통관요청", item.customs)}
          ${field("TERMS", item.terms)}
          ${field("PSK배차", item.pskDelivery)}
          ${field("포워더", item.forwarder)}
          ${field("W/O", item.wo)}
          ${field("S/N", item.sn)}
          ${field("장비명", item.model, true)}
          ${field("고객사", item.customer, true)}
          ${isEtc ? field("업체명", item.vendorName) + field("부분품", item.moduleText, true) : ""}
          ${field("담당자", item.manager)}
          ${field("INV", item.inv)}
          ${field("수출여부 원문", item.exportInfo, true)}
        </div>
      `;
    }

    function renderList(items) {
      if (!items.length) {
        state.listDate = "";
        listEl.innerHTML = '<div class="empty">조건에 맞는 데이터가 없습니다.</div>';
        return;
      }

      const dates = listDateCandidates(items);
      state.listDate = pickInitialListDate(items, state.listDate);
      const currentDate = state.listDate || dates[0] || "";
      const currentIndex = Math.max(dates.indexOf(currentDate), 0);
      const rows = items.filter(item => item.shipDate === currentDate).sort(compareDateTime);
      const title = formatListDateLabel(currentDate);
      const subText = rows.length ? `${rows.length}건` : "";

      const navHtml = `
        <div class="list-day-nav">
          <button class="list-day-btn" id="listPrevDate" type="button" ${currentIndex <= 0 ? "disabled" : ""}>&lt;</button>
          <div class="list-day-nav-main">
            <div class="list-day-title">${esc(title)}</div>
            <div class="list-day-sub">${esc(subText)}</div>
          </div>
          <button class="list-day-btn" id="listNextDate" type="button" ${currentIndex >= dates.length - 1 ? "disabled" : ""}>&gt;</button>
        </div>
      `;

      const bodyHtml = rows.length
        ? rows.map(item => `
            <article class="item">
              <button class="item-head" type="button">${renderItemSummary(item)}</button>
              <div class="detail">${renderItemDetail(item)}</div>
            </article>
          `).join("")
        : '<div class="empty">해당 날짜 작업이 없습니다.</div>';

      listEl.innerHTML = navHtml + bodyHtml;

      const prevBtn = $("listPrevDate");
      const nextBtn = $("listNextDate");
      if (prevBtn) prevBtn.addEventListener("click", () => moveListDate(items, -1));
      if (nextBtn) nextBtn.addEventListener("click", () => moveListDate(items, 1));

      listEl.querySelectorAll(".item-head").forEach(h => h.addEventListener("click", () => {
        h.closest(".item").classList.toggle("open");
      }));
    }

    const calCell = (x, sel) => x
      ? `<div class="cal-cell ${sel === x.ds ? "selected" : ""}" data-date="${x.ds}">
          <div class="cal-day">${x.day}</div>
          ${x.items.length ? `<div class="cal-count">${x.items.length}건</div>` : ""}
          <div class="cal-items">${x.items.slice(0, 2).map(it => `<div class="cal-item">${esc(it.wo || "-")} - ${esc(it.shipType || "-")} - ${esc(it.shipMode || "-")}</div>`).join("")}</div>
        </div>`
      : `<div class="cal-cell empty"></div>`;

    function renderCalendar(items) {
      const y = state.calendarYear;
      const m = state.calendarMonth;
      const last = new Date(y, m + 1, 0).getDate();

      const byDate = items.reduce((a, item) => {
        if (item.shipDate) (a[item.shipDate] = a[item.shipDate] || []).push(item);
        return a;
      }, {});

      const pad = n => String(n).padStart(2, "0");
      let html = "";
      let week = [];

      for (let day = 1; day <= last; day++) {
        const ds = `${y}-${pad(m + 1)}-${pad(day)}`;
        const wd = new Date(ds + "T00:00:00").getDay();
        week.push({ day, ds, wd, items: byDate[ds] || [] });

        if (wd === 0 || day === last) {
          const hasSat = week.some(x => x.wd === 6 && x.items.length > 0);
          const hasSun = week.some(x => x.wd === 0 && x.items.length > 0);
          const cols = ["월", "화", "수", "목", "금", ...(hasSat ? ["토"] : []), ...(hasSun ? ["일"] : [])];
          const map = Object.fromEntries(week.map(x => [x.wd, x]));
          html += `<div class="cal-week-block"><div class="cal-week-grid" style="grid-template-columns:repeat(${cols.length},1fr)">`;
          html += cols.map(n => `<div class="cal-weekday">${n}</div>`).join("");
          [1,2,3,4,5,...(hasSat?[6]:[]),...(hasSun?[0]:[])].forEach(k => { html += calCell(map[k], state.selectedDate); });
          html += `</div></div>`;
          week = [];
        }
      }

      calEl.innerHTML = html;
      calTitleEl.textContent = `${y}년 ${m + 1}월`;

      calEl.querySelectorAll(".cal-cell[data-date]").forEach(c => c.addEventListener("click", () => {
        state.selectedDate = c.dataset.date;
        renderAll();
      }));

      renderCalendarDayPanel(items);
    }

    function renderCalendarDayPanel(items) {
      if (!state.selectedDate) {
        calDayPanel.innerHTML = '<div class="day-panel-title">날짜를 선택하세요</div>';
        return;
      }

      const rows = sortByLoadTime(items.filter(item => item.shipDate === state.selectedDate));
      if (!rows.length) {
        calDayPanel.innerHTML = `<div class="day-panel-title">${esc(state.selectedDate)}</div><div class="empty">선택한 날짜의 데이터가 없습니다.</div>`;
        return;
      }

      calDayPanel.innerHTML = `
        <div class="day-panel-title">${esc(state.selectedDate)} · ${rows.length}건</div>
        <div class="day-list">
          ${rows.map((item, i) => {
            const workLoc = item.depart === "조립업체"
              ? (item.vendorName || item.depart)
              : ((item.category === "기타") ? (item.locationText || item.depart) : item.depart);

            return `
              <div class="day-card ${item.redAlert === 'Y' ? 'alert' : ''}" data-idx="${i}">
                <div class="day-card-title">${esc(item.wo || "-")} | ${esc(item.model || "-")}</div>
                <div class="day-card-sub">${esc(item.customer || "-")} · ${esc(item.corp || "-")} · ${esc(item.shipMode || "-")}</div>
                <div class="day-card-sub">작업지: ${esc(workLoc || "-")} · 상차시간: ${esc(item.loadTime || "-")}</div>
              </div>
            `;
          }).join("")}
        </div>
      `;

      calDayPanel.querySelectorAll(".day-card").forEach(c => c.addEventListener("click", () => openDetailModal(rows[+c.dataset.idx])));
    }

    function getReportColumns(corp) {
      const base = [
        { key: "depart", label: "출발지" },
        { key: "shipType", label: "구분" },
        { key: "shipDateText", label: "출하일", cls: "col-date" },
        { key: "loadTime", label: "상차시간" },
        { key: "unloadTime", label: "하차시간" },
        { key: "fabOutText", label: "FAB OUT" },
        { key: "packagingText", label: "포장예정" }
      ];
      if (corp === "PSK Holdings") base.push({ key: "sizeNotice", label: "사이즈 전달" }, { key: "shipRequest", label: "출하의뢰" });
      base.push(
        { key: "customs", label: "통관요청" },
        { key: "terms", label: "TERMS" },
        { key: "pskDelivery", label: "PSK배차" },
        { key: "wo", label: "W/O", cls: "col-wo" },
        { key: "sn", label: "S/N" },
        { key: "model", label: "장비명" },
        { key: "exportInfo", label: "수출여부", cls: "col-export" },
        { key: "forwarder", label: "포워더" },
        { key: "customer", label: "고객사" },
        { key: "manager", label: "담당자" },
        { key: "inv", label: "INV", cls: "col-inv" }
      );
      return base;
    }

    function buildReportTable(corp, rows) {
      const cols = getReportColumns(corp);
      const dateKey = "shipDateText";
      const dateCounts = {};
      rows.forEach(item => {
        const k = String(item[dateKey] || "");
        dateCounts[k] = (dateCounts[k] || 0) + 1;
      });
      const datePrinted = {};
      let body = "";

      rows.forEach(item => {
        const rowCls = item.redAlert === "Y" ? "row-alert" : "";
        body += `<tr class="${rowCls}">`;
        cols.forEach(c => {
          let cls = c.cls || "";
          if (c.key === "exportInfo" && item.shipType === "이관") cls += (cls ? " " : "") + "transfer";
          if (c.key === "inv" && item.invGreen === "Y") cls += (cls ? " " : "") + "has-inv";

          if (c.key === dateKey) {
            const k = String(item[dateKey] || "");
            if (!datePrinted[k]) {
              datePrinted[k] = 1;
              const rowspan = Math.max(dateCounts[k] || 1, 1);
              const mergedCls = (cls ? cls + " " : "") + "merged";
              body += `<td class="${esc(mergedCls)}" rowspan="${rowspan}">${esc(showVal(item[c.key]))}</td>`;
            }
          } else {
            body += `<td class="${esc(cls)}">${esc(showVal(item[c.key]))}</td>`;
          }
        });
        body += `</tr>`;
      });

      const thead = `<thead><tr>${cols.map(c => `<th>${esc(c.label)}</th>`).join("")}</tr></thead>`;
      return `<div class="report-table-wrap"><table class="report-table">${thead}<tbody>${body}</tbody></table></div>`;
    }

    function renderReport(items) {
      if (!items.length) {
        reportEl.innerHTML = '<div class="empty">조건에 맞는 데이터가 없습니다.</div>';
        return;
      }

      const corpGroups = items.reduce((a, i) => {
        (a[i.corp] = a[i.corp] || []).push(i);
        return a;
      }, {});

      reportEl.innerHTML = reportCorpOrder
        .filter(c => corpGroups[c] && corpGroups[c].length)
        .map(corp => {
          const deptGroups = corpGroups[corp].reduce((a, item) => {
            const dep = ((item.depart || "").trim()) || "기타";
            (a[dep] = a[dep] || []).push(item);
            return a;
          }, {});
          const extraDeps = Object.keys(deptGroups).filter(d => !reportDepartOrder.includes(d)).sort();
          const blocks = [...reportDepartOrder, ...extraDeps]
            .filter(d => deptGroups[d] && deptGroups[d].length)
            .map(dep => {
              const sortedRows = [...deptGroups[dep]].sort(compareReportDateTime);
              return `<section class="report-block"><div class="report-block-title">${esc(dep)} · ${sortedRows.length}건</div>${buildReportTable(corp, sortedRows)}</section>`;
            }).join("");

        }).join("") || '<div class="empty">조건에 맞는 데이터가 없습니다.</div>';
    }

    function buildSnapshotTargetsText(value) {
      const raw = String(value || "").trim();
      if (!raw) return "-";
      return raw.split("|").map(v => v.trim()).filter(Boolean).join(", ") || raw;
    }

    function getKstParts(v) {
      const raw = String(v || "").trim();
      const d = new Date(raw);
      if (!raw || Number.isNaN(d.getTime())) return null;
      const parts = new Intl.DateTimeFormat("ko-KR", {
        timeZone: "Asia/Seoul",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(d);
      const map = {};
      parts.forEach(p => {
        if (p.type !== "literal") map[p.type] = p.value;
      });
      return map;
    }

    function getHistoryDateKey(v) {
      const p = getKstParts(v);
      if (!p) return "날짜 미확인";
      return `${p.year}-${p.month}-${p.day}`;
    }

    function getHistoryTimeText(v) {
      const p = getKstParts(v);
      if (!p) return "--:--";
      return `${p.hour}:${p.minute}`;
    }

    function getHistoryDateTitle(dateKey) {
      if (!dateKey || dateKey === "날짜 미확인") return "날짜 미확인";
      const parts = dateKey.split("-");
      if (parts.length !== 3) return dateKey;
      return `${parts[0]}-${parts[1]}-${parts[2]}`;
    }

    function groupShipmentSnapshotsByDate(rows) {
      const groups = {};
      (Array.isArray(rows) ? rows : []).forEach(item => {
        const uploadedAt = item.uploaded_at || item.created_at || "";
        const key = getHistoryDateKey(uploadedAt);
        (groups[key] = groups[key] || []).push(item);
      });
      return Object.keys(groups).sort((a, b) => b.localeCompare(a)).map(key => ({
        dateKey: key,
        items: groups[key].sort((a, b) => String(b.uploaded_at || b.created_at || "").localeCompare(String(a.uploaded_at || a.created_at || "")))
      }));
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return '"' + text.replace(/"/g, '""') + '"';
    }

    function buildShipmentHistoryCsv(rows) {
      const columns = [
        ["corp", "법인"],
        ["category", "분류"],
        ["depart", "출발지"],
        ["shipType", "구분"],
        ["shipDate", "출하일"],
        ["shipDateText", "출하일_표시"],
        ["loadTime", "상차시간"],
        ["unloadTime", "하차시간"],
        ["fabOut", "FAB_OUT"],
        ["packaging", "포장예정"],
        ["sizeNotice", "사이즈_전달"],
        ["shipRequest", "출하의뢰"],
        ["customs", "통관요청"],
        ["terms", "TERMS"],
        ["pskDelivery", "PSK배차"],
        ["wo", "W/O"],
        ["sn", "S/N"],
        ["model", "장비명"],
        ["exportInfo", "수출여부"],
        ["shipMode", "수출내수구분"],
        ["forwarder", "포워더"],
        ["customer", "고객사"],
        ["manager", "담당자"],
        ["inv", "INV"],
        ["vendorName", "업체명"],
        ["moduleText", "부분품"],
        ["locationText", "위치"]
      ];
      const header = columns.map(c => csvEscape(c[1])).join(",");
      const body = (Array.isArray(rows) ? rows : []).map(row => columns.map(c => csvEscape(row[c[0]])).join(","));
      return "\ufeff" + [header].concat(body).join("\r\n");
    }

    function downloadText(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType || "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function makeHistoryCsvFilename(snapshot, rowCount) {
      const uploadedAt = snapshot && (snapshot.uploaded_at || snapshot.created_at || "");
      const p = getKstParts(uploadedAt);
      const stamp = p ? `${p.year}${p.month}${p.day}_${p.hour}${p.minute}` : "unknown_date";
      return `shipment_history_${stamp}_${rowCount || 0}rows.csv`;
    }

    async function downloadSnapshotCsv(snapshotId) {
      const id = String(snapshotId || "").trim();
      if (!id) return;
      const payload = normalizeShipmentPayload(await apiRequest("/api/shipment-snapshots/" + encodeURIComponent(id), { method: "GET" }, true));
      const rows = payload.data || [];
      const snapshot = payload.meta && payload.meta.snapshot ? payload.meta.snapshot : { snapshot_id: id };
      const csv = buildShipmentHistoryCsv(rows);
      downloadText(makeHistoryCsvFilename(snapshot, rows.length), csv, "text/csv;charset=utf-8");
    }

    async function handleAdminUserAction(action, userId, username) {
      if (!userId) {
        const msg = $('adminUserMsg');
        if (msg) {
          msg.style.color = '#b91c1c';
          msg.textContent = '사용자 ID를 확인할 수 없습니다. 사용자 목록 API의 id/username 값을 확인하세요.';
        } else {
          alert('사용자 ID를 확인할 수 없습니다.');
        }
        return;
      }

      let path = '';
      let confirmMsg = '';
      if (action === 'reset') {
        path = '/api/admin/users/reset-password';
        confirmMsg = `${username} 계정의 비밀번호를 init1234! 로 초기화할까요?`;
      } else if (action === 'disable') {
        path = '/api/admin/users/disable';
        confirmMsg = `${username} 계정을 사용 중지할까요?`;
      } else if (action === 'enable') {
        path = '/api/admin/users/enable';
        confirmMsg = `${username} 계정을 다시 사용 상태로 변경할까요?`;
      } else if (action === 'delete') {
        path = '/api/admin/users/delete';
        confirmMsg = `${username} 계정을 삭제할까요? 이 작업은 되돌리기 어렵습니다.`;
      } else {
        return;
      }

      if (!confirm(confirmMsg)) return;

      const msg = $('adminUserMsg');
      if (msg) {
        msg.style.color = '#b91c1c';
        msg.textContent = '처리 중...';
      }

      try {
        const payload = await adminUserPost(path, { user_id: userId });
        if (msg) {
          msg.style.color = '#15803d';
          msg.textContent = payload && payload.message ? payload.message : '처리 완료';
        }
        await openAdminUserManager();
      } catch (err) {
        if (msg) {
          msg.style.color = '#b91c1c';
          msg.textContent = err && err.message ? err.message : '처리 실패';
        } else {
          alert(err && err.message ? err.message : '처리 실패');
        }
      }
    }

    async function createNotice() {
      const msg = $('noticeMsg');
      const title = (($('noticeNewTitle') && $('noticeNewTitle').value) || '').trim();
      const body = (($('noticeNewBody') && $('noticeNewBody').value) || '').trim();
      if (msg) {
        msg.style.color = '#b91c1c';
        msg.textContent = '';
      }
      if (!title || !body) {
        if (msg) msg.textContent = '제목과 내용을 입력하세요.';
        return;
      }
      try {
        const payload = await apiRequest('/api/admin/notices', {
          method: 'POST',
          withJson: true,
          body: JSON.stringify({ title, body, is_active: 1 })
        }, true);
        if (msg) {
          msg.style.color = '#15803d';
          msg.textContent = payload && payload.message ? payload.message : '공지 등록 완료';
        }

        if (msg) msg.textContent = err && err.message ? err.message : '공지 등록 실패';

    function buildNotificationHtml(payload) {
      const emails = Array.isArray(payload && payload.emails) ? payload.emails : [];
      const subscribed = Array.isArray(payload && payload.subscribedDeparts) ? payload.subscribedDeparts : [];
      const available = Array.isArray(payload && payload.availableDeparts) ? payload.availableDeparts : [];
      const targets = Array.from(new Set([].concat(getFixedTargets(), available).filter(Boolean))).sort();

      const parts = ['<div class="notify-wrap">'];

      parts.push('<section class="notify-section">');
      parts.push('<div class="notify-title">메일 주소</div>');
      parts.push('<div class="notify-desc">알림을 받을 메일 주소를 등록합니다.</div>');
      parts.push('<div class="notify-row"><input id="notifyEmailInput" class="notify-input" type="text" placeholder="name@company.com"><button id="notifyAddEmailBtn" class="notify-btn" type="button">메일 추가</button></div>');
      parts.push('<div id="notifyMsg" class="notify-msg"></div>');
      parts.push('<div class="notify-email-list">');
      if (!emails.length) {
        parts.push('<div class="empty">등록된 메일이 없습니다.</div>');
      } else {
        emails.forEach(item => {
          parts.push('<div class="notify-email-item"><div>' + esc(item.email || '-') + '</div><button class="notify-btn secondary js-notify-delete-email" data-email-id="' + esc(item.id) + '" type="button">삭제</button></div>');
        });
      }
      parts.push('</div>');
      parts.push('</section>');

      parts.push('<section class="notify-section">');
      parts.push('<div class="notify-title">구독 대상</div>');
      parts.push('<div class="notify-desc">고정 구독 대상에 ASEM을 포함한 최종 기준입니다. 조립업체는 업체명 기준으로 저장됩니다.</div>');
      parts.push('<div class="notify-chip-grid">');
      targets.forEach(name => {
        const checked = subscribed.includes(name) ? 'checked' : '';
        parts.push('<label class="notify-chip"><input class="js-notify-target" type="checkbox" value="' + esc(name) + '" ' + checked + '><span>' + esc(name) + '</span></label>');

      parts.push('<div class="notify-row" style="margin-top:12px;"><button id="notifySaveTargetsBtn" class="notify-btn" type="button">구독 저장</button></div>');

    function bindNotificationEvents() {
      const addBtn = $('notifyAddEmailBtn');
      const saveBtn = $('notifySaveTargetsBtn');
      const msg = $('notifyMsg');

      if (addBtn) {
        addBtn.addEventListener('click', async () => {
          const emailInput = $('notifyEmailInput');
          const email = (emailInput && emailInput.value || '').trim();
          if (msg) {
            msg.style.color = '#b91c1c';
            msg.textContent = '';

            if (msg) msg.textContent = '메일 주소를 입력하세요.';
            return;
          }
          try {
            await addMyEmail(email);
            if (msg) {
              msg.style.color = '#15803d';
              msg.textContent = '메일이 저장되었습니다.';
            }
            await openNotificationSettings();
          } catch (err) {
            if (msg) msg.textContent = err && err.message ? err.message : '메일 저장 실패';

            msg.style.color = '#b91c1c';
            msg.textContent = '';
          }
          try {
            await saveMyTargets(collectMyTargetValues());

            if (msg) msg.textContent = err && err.message ? err.message : '구독 저장 실패';

        btn.addEventListener('click', async () => {

            await deleteMyEmail(btn.dataset.emailId);

          } catch (err) {
            if (msg) msg.textContent = err && err.message ? err.message : '메일 삭제 실패';
          }
        });
      });

        '<div class="password-change-field"><label class="password-change-label">새 비밀번호</label><input id="passwordChangeNewPassword" class="password-change-input" type="password" autocomplete="new-password"></div>',
        '<div class="password-change-field"><label class="password-change-label">새 비밀번호 확인</label><input id="passwordChangeNewPasswordConfirm" class="password-change-input" type="password" autocomplete="new-password"></div>',
        '<div class="password-change-actions"><button id="passwordChangeSaveBtn" class="password-change-btn" type="button">비밀번호 변경</button></div>',

        '</div>'

    function bindPasswordChangeEvents() {
      const saveBtn = $('passwordChangeSaveBtn');
      const oldPw = $('passwordChangeOldPassword');
      const newPw = $('passwordChangeNewPassword');
      const confirmPw = $('passwordChangeNewPasswordConfirm');
      if (saveBtn) saveBtn.addEventListener('click', changeMyPassword);
      [oldPw, newPw, confirmPw].filter(Boolean).forEach(el => {
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter') changeMyPassword();
        });
      });

    async function changeMyPassword() {
      const msg = $('passwordChangeMsg');
      const username = (($('passwordChangeUsername') && $('passwordChangeUsername').value) || '').trim();
      const oldPassword = (($('passwordChangeOldPassword') && $('passwordChangeOldPassword').value) || '');
      const newPassword = (($('passwordChangeNewPassword') && $('passwordChangeNewPassword').value) || '');
      const newPasswordConfirm = (($('passwordChangeNewPasswordConfirm') && $('passwordChangeNewPasswordConfirm').value) || '');

      if (msg) {
        msg.style.color = '#b91c1c';
        msg.textContent = '';
      }

      if (!username || !oldPassword || !newPassword || !newPasswordConfirm) {
        if (msg) msg.textContent = 'ID, 기존 비밀번호, 새 비밀번호를 모두 입력하세요.';
        return;
      }
      if (newPassword !== newPasswordConfirm) {
        if (msg) msg.textContent = '새 비밀번호와 확인값이 일치하지 않습니다.';
        return;
      }

      try {
        await apiRequest('/api/me/change-password', {
          method: 'POST',
          withJson: true,
          body: JSON.stringify({
            username,
            old_password: oldPassword,
            new_password: newPassword,
            new_password_confirm: newPasswordConfirm
          })
        }, true);

        if (msg) {
          msg.style.color = '#15803d';
          msg.textContent = '비밀번호가 변경되었습니다. 다시 로그인해 주세요.';
        }

        setTimeout(async () => {
          await logout();
          closePasswordChangeModal();
        }, 900);
      } catch (err) {
        if (msg) msg.textContent = err && err.message ? err.message : '비밀번호 변경 실패';
      }
    }

      });
      if (menuAdminNotify) menuAdminNotify.addEventListener('click', openAdminNotificationManager);
    }

    function renderAll() {
      const items = filteredData();
      renderViewTabs();
      renderCorpTabs();
      renderModeTabs();
      renderFilterTabs();
      renderPageMetaBar();
      state.listDate = pickInitialListDate(items, state.listDate);
      const summaryLabel = state.dataMode === "snapshot" ? "이력 조회 건수" : "전체 예정 건수";
      const summaryExtra = state.dataMode === "snapshot" && selectedSnapshot
        ? `<div class="summary-label" style="margin-top:6px;">${esc(toKstFullDisplay(selectedSnapshot.uploaded_at || pageMeta.updatedAt || ""))}</div>`
        : "";
      summaryInlineEl.innerHTML = `<div class="summary-card"><div class="summary-label">${summaryLabel}</div><div class="summary-value">${items.length}</div>${summaryExtra}</div>`;
      summaryEl.innerHTML = '';
      toggleAdvancedFiltersBtn.textContent = state.advancedOpen ? '필터 닫기' : '필터 열기';
      advancedFiltersEl.classList.toggle('hidden', !state.advancedOpen);
      renderMainView(items);
    }

    searchInput.addEventListener('input', e => {
      state.keyword = e.target.value;
      renderAll();
    });

    dateFromEl.addEventListener('change', e => {
      state.dateFrom = e.target.value;
      renderAll();
    });

    dateToEl.addEventListener('change', e => {
      state.dateTo = e.target.value;
      renderAll();
    });

    dateResetEl.addEventListener('click', () => {
      state.dateFrom = '';
      state.dateTo = '';
      dateFromEl.value = '';
      dateToEl.value = '';
      renderAll();
    });

    toggleAdvancedFiltersBtn.addEventListener('click', () => {
      state.advancedOpen = !state.advancedOpen;
      renderAll();
    });

    $('prevMonth').addEventListener('click', () => {
      state.calendarMonth--;
      if (state.calendarMonth < 0) {
        state.calendarMonth = 11;
        state.calendarYear--;
      }
      state.selectedDate = '';
      renderAll();
    });

    $('nextMonth').addEventListener('click', () => {
      state.calendarMonth++;
      if (state.calendarMonth > 11) {
        state.calendarMonth = 0;
        state.calendarYear++;
      }
      state.selectedDate = '';
      renderAll();
    });

    modalBackdrop.addEventListener('click', closeDetailModal);
    modalClose.addEventListener('click', closeDetailModal);

    notificationModalBackdrop.addEventListener('click', closeNotificationModal);
    notificationModalClose.addEventListener('click', closeNotificationModal);

    noticeModalBackdrop.addEventListener('click', closeNoticeModal);
    noticeModalClose.addEventListener('click', closeNoticeModal);
    if (publicNoticeMoreBtn) publicNoticeMoreBtn.addEventListener('click', openNoticeModal);

    adminNotificationModalBackdrop.addEventListener('click', closeAdminNotificationModal);
    adminNotificationModalClose.addEventListener('click', closeAdminNotificationModal);

    adminIpModalBackdrop.addEventListener('click', closeAdminIpModal);
    adminIpModalClose.addEventListener('click', closeAdminIpModal);

    adminUserModalBackdrop.addEventListener('click', closeAdminUserModal);
    adminUserModalClose.addEventListener('click', closeAdminUserModal);

    passwordChangeModalBackdrop.addEventListener('click', closePasswordChangeModal);
    passwordChangeModalClose.addEventListener('click', closePasswordChangeModal);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (!passwordChangeModal.classList.contains('hidden')) closePasswordChangeModal();
        if (!adminUserModal.classList.contains('hidden')) closeAdminUserModal();
        if (!adminIpModal.classList.contains('hidden')) closeAdminIpModal();
        if (!adminNotificationModal.classList.contains('hidden')) closeAdminNotificationModal();
        if (!noticeModal.classList.contains('hidden')) closeNoticeModal();
        if (!notificationModal.classList.contains('hidden')) closeNotificationModal();
        if (!detailModal.classList.contains('hidden')) closeDetailModal();
      }
    });

    loginBtn.addEventListener('click', login);
    loginPassword.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    (async () => {
      await loadPublicNotices();
      const ok = await checkSession();
      if (ok) {
        try {
          await loadCurrentShipments();
          showAppView();
          renderAll();
        } catch (err) {
          showAppView();
          renderAll();
        }
      }
    })();
  </script>
</body>
</html>
