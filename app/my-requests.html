<!-- PSK Shipment Viewer 내 요청 목록 화면 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 출하 요청 목록</title>
  <link rel="stylesheet" href="./css/request.css" />
</head>
<body>
  <main class="page-wrap">
    <section class="card">
      <div class="page-header">
        <div>
          <p class="eyebrow">PSK Shipment Viewer</p>
          <h1>내 출하 요청 목록</h1>
        </div>
        <span class="badge">DEV</span>
      </div>

      <div class="button-row" style="justify-content: space-between; margin-top: 0;">
        <button type="button" class="btn btn-secondary" onclick="location.href='./request.html'">
          요청 입력
        </button>
        <button type="button" class="btn btn-primary" id="reloadBtn">
          새로고침
        </button>
      </div>

      <p id="statusMessage" class="status-message"></p>

      <div style="overflow-x: auto; margin-top: 18px;">
        <table style="width: 100%; border-collapse: collapse; min-width: 720px;">
          <thead>
            <tr>
              <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">요청 제목</th>
              <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">장비명</th>
              <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">W/O</th>
              <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">S/N</th>
              <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">고객사</th>
              <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">상태</th>
            </tr>
          </thead>
          <tbody id="requestTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const API_BASE_URL = "https://psk-shipment-api-dev.ms1743.workers.dev";

    const statusMessage = document.getElementById("statusMessage");
    const requestTableBody = document.getElementById("requestTableBody");
    const reloadBtn = document.getElementById("reloadBtn");

    function getAuthToken() {
      return (
        localStorage.getItem("token") ||
        localStorage.getItem("authToken") ||
        localStorage.getItem("access_token") ||
        sessionStorage.getItem("token") ||
        sessionStorage.getItem("authToken") ||
        sessionStorage.getItem("access_token") ||
        ""
      );
    }

    function setStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = "status-message " + type;
    }

    function renderRows(items) {
      requestTableBody.innerHTML = "";

      if (!Array.isArray(items) || items.length === 0) {
        requestTableBody.innerHTML = '<tr><td colspan="6" style="padding:14px;">조회된 요청이 없습니다.</td></tr>';
        return;
      }

      items.forEach(function (item) {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td style="padding:10px; border-bottom:1px solid #eee;">${item.request_title || ""}</td>
          <td style="padding:10px; border-bottom:1px solid #eee;">${item.equipment_name || ""}</td>
          <td style="padding:10px; border-bottom:1px solid #eee;">${item.wo || ""}</td>
          <td style="padding:10px; border-bottom:1px solid #eee;">${item.sn || ""}</td>
          <td style="padding:10px; border-bottom:1px solid #eee;">${item.customer_name || ""}</td>
          <td style="padding:10px; border-bottom:1px solid #eee;">${item.status || ""}</td>
        `;

        requestTableBody.appendChild(tr);
      });
    }

    async function loadMyRequests() {
      const token = getAuthToken();

      if (!token) {
        setStatus("로그인 토큰을 찾을 수 없습니다. 먼저 DEV 로그인 후 다시 시도하세요.", "error");
        return;
      }

      try {
        setStatus("조회 중입니다...", "success");

        const response = await fetch(API_BASE_URL + "/api/v2/my-requests", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const result = await response.json();

        console.log("GET /api/v2/my-requests result:", result);

        if (!response.ok || result.ok === false) {
          setStatus(result.message || "조회 실패", "error");
          return;
        }

        renderRows(result.items || result.data || result.requests || []);
        setStatus("조회 완료", "success");
      } catch (error) {
        console.error(error);
        setStatus("API 호출 중 오류가 발생했습니다. 콘솔을 확인하세요.", "error");
      }
    }

    reloadBtn.addEventListener("click", loadMyRequests);
    loadMyRequests();
  </script>
</body>
</html>
