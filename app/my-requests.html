<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 요청 목록</title>
  <link rel="stylesheet" href="./css/request.css" />
</head>
<body>
  <main class="page">
    <section class="page-header">
      <div>
        <h1>내 요청 목록</h1>
        <p>작성한 출하 요청을 조회합니다.</p>
      </div>

      <div class="header-actions">
        <button type="button" class="btn-primary" onclick="goCreate()">
          신규 요청
        </button>
      </div>
    </section>

    <section class="card">
      <div id="message" class="message"></div>

      <div class="table-scroll">
        <table class="request-table">
          <thead>
            <tr>
              <th>상태</th>
              <th>요청 제목</th>
              <th>장비명</th>
              <th>W/O</th>
              <th>S/N</th>
              <th>고객사</th>
              <th>작성일</th>
              <th>관리</th>
            </tr>
          </thead>

          <tbody id="requestTableBody">
            <tr>
              <td colspan="8" class="empty-row">
                불러오는 중...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "https://psk-shipment-api-dev.ms1743.workers.dev";

    function getAuthToken() {
      return (
        localStorage.getItem("PSK_SHIPMENT_AUTH_TOKEN") ||
        localStorage.getItem("token") ||
        localStorage.getItem("authToken") ||
        localStorage.getItem("access_token") ||
        sessionStorage.getItem("PSK_SHIPMENT_AUTH_TOKEN") ||
        sessionStorage.getItem("token") ||
        sessionStorage.getItem("authToken") ||
        sessionStorage.getItem("access_token") ||
        ""
      );
    }

    function setMessage(text, type) {
      const el = document.getElementById("message");
      el.textContent = text || "";
      el.className = "message";

      if (type) {
        el.classList.add(type);
      }
    }

    function safeText(value) {
      return value === null || value === undefined || value === ""
        ? "-"
        : String(value);
    }

    function formatDate(value) {
      if (!value) return "-";

      const d = new Date(value);

      if (Number.isNaN(d.getTime())) {
        return value;
      }

      return d.toLocaleString("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function buildStatusBadge(status) {
      const value = (status || "draft").toLowerCase();

      return `
        <span class="status-badge status-${value}">
          ${value}
        </span>
      `;
    }

    function goCreate() {
      window.location.href = "./request.html";
    }

    function goDetail(requestId) {
      if (!requestId) {
        alert("request_id가 없습니다.");
        return;
      }

      window.location.href =
        "./request-detail.html?request_id=" +
        encodeURIComponent(requestId);
    }

    function renderRows(items) {
      const tbody = document.getElementById("requestTableBody");

      if (!Array.isArray(items) || !items.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" class="empty-row">
              요청 내역이 없습니다.
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = items.map((item) => {
        const requestId = item.request_id || "";
        const requestTitle = safeText(item.request_title);
        const equipmentName = safeText(item.equipment_name);
        const wo = safeText(item.wo);
        const sn = safeText(item.sn);
        const customerName = safeText(item.customer_name);
        const status = item.request_status || "draft";
        const createdAt = formatDate(item.created_at);

        return `
          <tr>
            <td>
              ${buildStatusBadge(status)}
            </td>

            <td class="text-left">
              ${requestTitle}
            </td>

            <td>
              ${equipmentName}
            </td>

            <td>
              ${wo}
            </td>

            <td>
              ${sn}
            </td>

            <td>
              ${customerName}
            </td>

            <td>
              ${createdAt}
            </td>

            <td>
              <button
                type="button"
                class="btn-secondary"
                onclick="goDetail('${requestId}')"
              >
                보기
              </button>
            </td>
          </tr>
        `;
      }).join("");
    }

    async function loadMyRequests() {
      const token = getAuthToken();

      if (!token) {
        setMessage(
          "로그인 토큰을 찾을 수 없습니다. 먼저 DEV 로그인 후 다시 시도하세요.",
          "error"
        );
        return;
      }

      try {
        const res = await fetch(
          `${API_BASE}/api/v2/my-requests`,
          {
            method: "GET",
            headers: {
              "Authorization": `Bearer ${token}`
            }
          }
        );

        const data = await res.json().catch(() => ({}));

        if (!res.ok || data.ok === false) {
          throw new Error(
            data.message || `조회 실패: HTTP ${res.status}`
          );
        }

        renderRows(data.items || []);
        setMessage("");

      } catch (err) {
        console.error(err);

        setMessage(
          err.message || "조회 중 오류가 발생했습니다.",
          "error"
        );
      }
    }

    loadMyRequests();
  </script>
</body>
</html>
