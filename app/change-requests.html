<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>수정/삭제 요청 관리</title>
  <link rel="stylesheet" href="/app/css/request.css" />
</head>
<body>
  <main class="page">
    <section class="page-header">
      <div>
        <h1>수정/삭제 요청 관리</h1>
        <p>관리자가 출하 요청의 수정/삭제 요청을 승인 또는 반려합니다.</p>
      </div>
      <div class="header-actions">
        <button type="button" class="title-button" onclick="location.href='/index.html'">메인</button>
        <button type="button" class="title-button" onclick="location.href='/app/my-requests.html'">요청 목록</button>
        <button type="button" class="title-button" onclick="location.href='/app/confirmed-shipments.html'">확정 출하</button>
      </div>
    </section>

    <section class="card">
      <div class="form-grid">
        <label>
          상태
          <select id="statusFilter">
            <option value="pending" selected>pending</option>
            <option value="approved">approved</option>
            <option value="rejected">rejected</option>
            <option value="">전체</option>
          </select>
        </label>

        <label>
          유형
          <select id="typeFilter">
            <option value="">전체</option>
            <option value="change">수정 요청</option>
            <option value="delete">삭제 요청</option>
          </select>
        </label>
      </div>

      <div class="button-row">
        <button type="button" class="title-button" onclick="loadChangeRequests()">조회</button>
      </div>
    </section>

    <section class="card">
      <div class="section-title-row">
        <h2>요청 목록</h2>
        <span id="summaryText" class="muted">조회 전</span>
      </div>

      <div id="messageBox" class="message-box" style="display:none;"></div>

      <div class="table-scroll">
        <table class="data-table">
          <thead>
            <tr>
              <th>요청일</th>
              <th>유형</th>
              <th>상태</th>
              <th>요청 ID</th>
              <th>출하요청 ID</th>
              <th>주요 변경 내용</th>
              <th>요청자</th>
              <th>처리</th>
            </tr>
          </thead>
          <tbody id="changeRequestBody">
            <tr>
              <td colspan="8" class="empty-cell">조회 버튼을 눌러 주세요.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

<script>
const API_BASE = "https://psk-shipment-api-dev.ms1743.workers.dev";

function getAuthToken() {
  return (
    localStorage.getItem("PSK_SHIPMENT_AUTH_TOKEN") ||
    localStorage.getItem("token") ||
    localStorage.getItem("authToken") ||
    localStorage.getItem("access_token") ||
    sessionStorage.getItem("PSK_SHIPMENT_AUTH_TOKEN") ||
    sessionStorage.getItem("token") ||
    sessionStorage.getItem("authToken") ||
    sessionStorage.getItem("access_token") ||
    ""
  );
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDateTime(value) {
  if (!value) return "-";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return escapeHtml(value);

  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  const hh = String(date.getHours()).padStart(2, "0");
  const mi = String(date.getMinutes()).padStart(2, "0");
  return `${mm}/${dd} ${hh}:${mi}`;
}

function showMessage(message, type) {
  const box = document.getElementById("messageBox");
  box.textContent = message;
  box.className = `message-box ${type || ""}`;
  box.style.display = "block";
}

function hideMessage() {
  const box = document.getElementById("messageBox");
  box.textContent = "";
  box.style.display = "none";
}

function getChangeTypeLabel(item) {
  const type = String(item.type || item.request_type || item.change_type || "").toLowerCase();

  if (type.includes("delete")) return "삭제 요청";
  if (type.includes("change") || type.includes("update") || type.includes("modify")) return "수정 요청";

  if (item.delete_requested || item.is_delete_request) return "삭제 요청";
  return "수정 요청";
}

function getStatusBadge(status) {
  const value = String(status || "-").toLowerCase();
  return `<span class="status-badge status-${escapeHtml(value)}">${escapeHtml(value)}</span>`;
}

function pickFirst(item, keys) {
  for (const key of keys) {
    if (item && item[key] !== undefined && item[key] !== null && item[key] !== "") {
      return item[key];
    }
  }
  return "";
}

function parseJsonSafe(value) {
  if (!value) return null;
  if (typeof value === "object") return value;
  try {
    return JSON.parse(value);
  } catch {
    return null;
  }
}

function buildDiffSummary(item) {
  const typeLabel = getChangeTypeLabel(item);
  if (typeLabel === "삭제 요청") {
    const reason = pickFirst(item, ["reason", "request_reason", "delete_reason", "comment"]);
    return reason ? `삭제 사유: ${escapeHtml(reason)}` : "삭제 요청";
  }

  const beforeObj = parseJsonSafe(pickFirst(item, ["before_data", "before_json", "old_data", "old_values"]));
  const afterObj = parseJsonSafe(pickFirst(item, ["after_data", "after_json", "new_data", "new_values", "change_data"]));

  if (beforeObj || afterObj) {
    const keys = Array.from(new Set([
      ...Object.keys(beforeObj || {}),
      ...Object.keys(afterObj || {})
    ]));

    const preferredKeys = [
      "customer_name",
      "equipment_name",
      "wo",
      "sn",
      "request_title",
      "status",
      "fab_out_date",
      "transfer_plan_date",
      "load_place",
      "load_date",
      "load_time",
      "unload_place",
      "unload_date",
      "unload_time"
    ];

    const orderedKeys = [
      ...preferredKeys.filter(k => keys.includes(k)),
      ...keys.filter(k => !preferredKeys.includes(k))
    ];

    const changed = orderedKeys
      .filter(key => String(beforeObj?.[key] ?? "") !== String(afterObj?.[key] ?? ""))
      .slice(0, 6)
      .map(key => {
        const beforeValue = beforeObj?.[key] ?? "";
        const afterValue = afterObj?.[key] ?? "";
        return `<div><strong>${escapeHtml(key)}</strong>: ${escapeHtml(beforeValue || "-")} → ${escapeHtml(afterValue || "-")}</div>`;
      });

    if (changed.length > 0) return changed.join("");
  }

  const summary = pickFirst(item, ["change_summary", "summary", "description", "comment", "reason"]);
  return summary ? escapeHtml(summary) : "변경 내용 확인 필요";
}

async function apiFetch(path, options = {}) {
  const token = getAuthToken();
  if (!token) {
    throw new Error("로그인 토큰을 찾을 수 없습니다. DEV 로그인 후 다시 시도하세요.");
  }

  const response = await fetch(`${API_BASE}${path}`, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      ...(options.headers || {})
    }
  });

  const data = await response.json().catch(() => null);

  if (!response.ok || !data?.ok) {
    throw new Error(data?.message || data?.error || `API 오류: ${response.status}`);
  }

  return data;
}

async function loadChangeRequests() {
  hideMessage();

  const tbody = document.getElementById("changeRequestBody");
  const summary = document.getElementById("summaryText");

  tbody.innerHTML = `<tr><td colspan="8" class="empty-cell">조회 중...</td></tr>`;
  summary.textContent = "조회 중";

  try {
    const status = document.getElementById("statusFilter").value;
    const type = document.getElementById("typeFilter").value;

    const params = new URLSearchParams();
    if (status) params.set("status", status);
    if (type) params.set("type", type);

    const data = await apiFetch(`/api/v2/change-requests?${params.toString()}`);
    const items = Array.isArray(data.items) ? data.items : [];

    summary.textContent = `${items.length}건`;

    if (items.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="empty-cell">조회 결과가 없습니다.</td></tr>`;
      return;
    }

    tbody.innerHTML = items.map(item => {
      const changeRequestId = pickFirst(item, ["change_request_id", "id"]);
      const requestId = pickFirst(item, ["request_id", "shipment_request_id"]);
      const statusValue = pickFirst(item, ["status", "request_status"]);
      const requester = pickFirst(item, ["requested_by", "requester", "created_by", "username", "display_name"]);
      const createdAt = pickFirst(item, ["created_at", "requested_at"]);

      const isPending = String(statusValue).toLowerCase() === "pending";

      return `
        <tr>
          <td>${formatDateTime(createdAt)}</td>
          <td>${escapeHtml(getChangeTypeLabel(item))}</td>
          <td>${getStatusBadge(statusValue)}</td>
          <td>${escapeHtml(changeRequestId || "-")}</td>
          <td>
            ${requestId ? `<button type="button" class="link-button" onclick="openRequestDetail('${escapeHtml(requestId)}')">${escapeHtml(requestId)}</button>` : "-"}
          </td>
          <td class="text-left">${buildDiffSummary(item)}</td>
          <td>${escapeHtml(requester || "-")}</td>
          <td>
            ${isPending ? `
              <div class="row-actions">
                <button type="button" class="btn-edit" onclick="approveChangeRequest('${escapeHtml(changeRequestId)}')">승인</button>
                <button type="button" class="btn-delete" onclick="rejectChangeRequest('${escapeHtml(changeRequestId)}')">반려</button>
              </div>
            ` : "-"}
          </td>
        </tr>
      `;
    }).join("");

  } catch (error) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty-cell">조회 실패</td></tr>`;
    summary.textContent = "조회 실패";
    showMessage(error.message, "error");
  }
}

function openRequestDetail(requestId) {
  sessionStorage.setItem("PSK_SHIPMENT_SELECTED_REQUEST_ID", requestId);
  location.href = `/app/request-detail.html?request_id=${encodeURIComponent(requestId)}`;
}

async function approveChangeRequest(changeRequestId) {
  if (!changeRequestId) {
    showMessage("change_request_id가 없습니다.", "error");
    return;
  }

  if (!confirm("이 수정/삭제 요청을 승인하시겠습니까?")) return;

  try {
    await apiFetch(`/api/v2/change-requests/${encodeURIComponent(changeRequestId)}/approve`, {
      method: "POST",
      body: JSON.stringify({})
    });

    showMessage("승인 완료되었습니다.", "success");
    await loadChangeRequests();

  } catch (error) {
    showMessage(error.message, "error");
  }
}

async function rejectChangeRequest(changeRequestId) {
  if (!changeRequestId) {
    showMessage("change_request_id가 없습니다.", "error");
    return;
  }

  const reason = prompt("반려 사유를 입력하세요.", "");
  if (reason === null) return;

  try {
    await apiFetch(`/api/v2/change-requests/${encodeURIComponent(changeRequestId)}/reject`, {
      method: "POST",
      body: JSON.stringify({
        reason: reason.trim()
      })
    });

    showMessage("반려 완료되었습니다.", "success");
    await loadChangeRequests();

  } catch (error) {
    showMessage(error.message, "error");
  }
}

document.addEventListener("DOMContentLoaded", loadChangeRequests);
</script>
</body>
</html>
