<!-- PSK Shipment Viewer 요청 상세 화면 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>출하 요청 상세</title>
  <link rel="stylesheet" href="./css/request.css" />
</head>
<body>
  <main class="page-wrap">
    <section class="card">
      <div class="page-header">
        <div>
          <p class="eyebrow">PSK Shipment Viewer</p>
          <h1>출하 요청 상세</h1>
        </div>
        <span class="badge">DEV</span>
      </div>

      <div class="button-row" style="justify-content: space-between; margin-top: 0;">
        <button type="button" class="btn btn-secondary" onclick="location.href='./my-requests.html'">목록으로</button>
        <button type="button" class="btn btn-primary" onclick="location.href='./request.html'">새 요청</button>
      </div>

      <p id="statusMessage" class="status-message"></p>

      <div id="detailArea" class="form-grid" style="margin-top: 20px;"></div>
    </section>
  </main>

  <script>
    const detailArea = document.getElementById("detailArea");
    const statusMessage = document.getElementById("statusMessage");

    function safe(value) {
      return value == null || value === "" ? "-" : String(value);
    }

    function addField(label, value) {
      const box = document.createElement("div");
      box.className = "field";
      box.innerHTML = `
        <span>${label}</span>
        <div style="min-height:44px; border:1px solid #d1d5db; border-radius:10px; padding:11px 12px; background:#f9fafb; font-size:15px;">
          ${safe(value)}
        </div>
      `;
      detailArea.appendChild(box);
    }

    function renderDetail() {
      const raw = sessionStorage.getItem("PSK_SELECTED_REQUEST");

      if (!raw) {
        statusMessage.textContent = "상세 데이터가 없습니다. 목록에서 다시 선택하세요.";
        statusMessage.className = "status-message error";
        return;
      }

      const item = JSON.parse(raw);

      addField("요청 제목", item.request_title);
      addField("장비명", item.equipment_name);
      addField("W/O", item.wo);
      addField("S/N", item.sn);
      addField("고객사", item.customer_name);
      addField("상태", item.status);
      addField("요청 ID", item.id || item.request_id);
      addField("생성일", item.created_at);
      addField("수정일", item.updated_at);

      statusMessage.textContent = "상세 조회 완료";
      statusMessage.className = "status-message success";
    }

    renderDetail();
  </script>
</body>
</html>
