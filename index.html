<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>출하 현황 조회</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:#f3f5f8;color:#1f2937}
.app{max-width:1600px;margin:0 auto;min-height:100vh;background:#f3f5f8}
.header{position:sticky;top:0;z-index:10;background:rgba(243,245,248,.96);backdrop-filter:blur(8px);padding:14px 14px 10px;border-bottom:1px solid #e5e7eb}
.title{font-size:20px;font-weight:800;margin:0 0 4px}
.subtitle{margin:0;font-size:13px;color:#6b7280}
.summary{display:none}
.summary-card{background:#fff;border-radius:14px;padding:10px 10px;box-shadow:0 4px 14px rgba(15,23,42,.06);text-align:center;height:100%;display:flex;flex-direction:column;justify-content:center}
.summary-label{font-size:11px;color:#6b7280;margin-bottom:6px}
.summary-value{font-size:20px;font-weight:800}
.controls{padding:12px 14px;display:grid;gap:10px}
.top-layout{display:grid;grid-template-columns:minmax(320px,1fr) minmax(420px,560px);gap:24px;align-items:start}
.top-left-area{display:grid;gap:10px;justify-items:start;align-content:start}
.top-right-area{display:grid;gap:10px;justify-items:end;align-content:start}
.summary-inline{width:220px;min-width:220px}
.search-wrap{display:flex;justify-content:end;width:100%}
.search{width:460px;max-width:100%;border:1px solid #d1d5db;border-radius:14px;padding:13px 14px;font-size:15px;background:#fff}
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;flex-wrap:wrap}
.tab{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:999px;padding:10px 14px;font-size:14px;font-weight:700;white-space:nowrap;cursor:pointer;flex:0 0 auto}
.tab.active{background:#111827;color:#fff;border-color:#111827}
.filter-toggle-row{display:flex;justify-content:flex-start}
.filter-toggle-btn{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:800;cursor:pointer}
.advanced-filters{display:grid;gap:10px}
.filter-block{display:grid;gap:6px}
.filter-block-title{font-size:12px;font-weight:800;color:#6b7280;padding:0 2px}
.date-action-row{display:flex;align-items:center;justify-content:end;gap:10px;flex-wrap:wrap;width:100%}
.date-range{display:flex;align-items:center;gap:8px;flex:1;min-width:280px}
.date-range.compact{flex:0 1 460px;min-width:0}
.date-input{border:1px solid #d1d5db;border-radius:10px;padding:9px 10px;font-size:14px;background:#fff;color:#374151;flex:1;min-width:0}
.date-sep{color:#9ca3af;font-weight:700;flex:0 0 auto}
.date-reset,.copy-mail-btn{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.copy-mail-btn{background:#111827;color:#fff;border-color:#111827}
.copy-mail-btn:disabled{opacity:.55;cursor:default}
.hidden{display:none !important}
.empty{background:#fff;border-radius:16px;padding:32px 18px;text-align:center;color:#6b7280;box-shadow:0 4px 14px rgba(15,23,42,.06)}
.list,.report{padding:0 14px 18px}
.report{display:grid;gap:16px}
.item{background:#fff;border-radius:16px;margin-bottom:10px;box-shadow:0 4px 14px rgba(15,23,42,.06);overflow:hidden;border:1px solid #eef2f7}
.item-head{width:100%;border:0;background:#fff;padding:14px;text-align:left;cursor:pointer}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.badge-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.corp-badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800}
.corp-psk{background:#dbeafe;color:#1d4ed8}
.corp-holdings{background:#fef3c7;color:#b45309}
.mode-badge{display:inline-block;background:#ede9fe;color:#6d28d9;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800}
.vendor-badge{display:inline-block;background:#f0fdf4;color:#15803d;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800}
.summary-line{display:flex;align-items:center;gap:10px;min-width:0;flex:1;flex-wrap:wrap}
.summary-wo{font-size:15px;font-weight:900;color:#111827;flex:0 0 auto}
.summary-sep{color:#cbd5e1;font-weight:700;flex:0 0 auto}
.summary-model{font-size:14px;color:#1f2937;font-weight:700;min-width:0}
.summary-customer{font-size:13px;color:#6b7280;font-weight:700;min-width:0}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px}
.pill{background:#f3f4f6;color:#374151;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}
.arrow{font-size:18px;color:#9ca3af;transition:transform .2s ease;flex:0 0 auto}
.summary-main{min-width:0;flex:1}
.summary-main *{word-break:break-word}
.item.open .arrow{transform:rotate(180deg)}
.detail{display:none;border-top:1px solid #eef2f7;background:#fafbfc;padding:12px 14px 14px}
.item.open .detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
.field{min-width:0}
.field-label{font-size:11px;color:#6b7280;margin-bottom:3px;font-weight:700}
.field-value{font-size:13px;color:#111827;font-weight:700;word-break:break-word;line-height:1.4}
.calendar-toolbar{display:flex;align-items:center;justify-content:space-between;padding:0 14px 10px;gap:10px}
.calendar-title{font-size:18px;font-weight:800;color:#111827}
.nav-btn{border:1px solid #d1d5db;background:#fff;border-radius:10px;padding:8px 12px;font-size:14px;font-weight:800;cursor:pointer}
.calendar-wrap{padding:0 14px 18px;display:grid;grid-template-columns:minmax(0,1.6fr) minmax(360px,.9fr);gap:16px;align-items:start}
.calendar{display:grid;gap:12px}
.cal-week-block{display:block}
.cal-week-grid{display:grid;gap:8px;max-width:none;width:100%;margin:0}
.cal-weekday{background:#e5e7eb;color:#374151;border-radius:10px;padding:10px 4px;text-align:center;font-size:12px;font-weight:800}
.cal-cell{background:#fff;border:1px solid #e5e7eb;border-radius:14px;min-height:108px;padding:8px;display:flex;flex-direction:column;gap:6px;cursor:pointer;box-shadow:0 4px 14px rgba(15,23,42,.04)}
.cal-cell.empty{background:transparent;border:0;box-shadow:none;cursor:default}
.cal-cell.selected{border:2px solid #111827}
.cal-day{font-size:13px;font-weight:800;color:#111827}
.cal-count{font-size:12px;font-weight:700;color:#2563eb}
.cal-items{display:flex;flex-direction:column;gap:4px;min-width:0}
.cal-item{background:#f3f4f6;border-radius:8px;padding:4px 6px;font-size:11px;font-weight:700;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.calendar-day-panel{background:#fff;border-radius:16px;padding:14px;box-shadow:0 4px 14px rgba(15,23,42,.06);border:1px solid #eef2f7;position:sticky;top:88px;max-height:calc(100vh - 110px);overflow:auto}
.day-panel-title{font-size:15px;font-weight:800;margin-bottom:10px;color:#111827}
.day-list{display:grid;gap:8px}
.day-card{border:1px solid #e5e7eb;background:#fafafa;border-radius:12px;padding:10px;cursor:pointer}
.day-card-title{font-size:13px;font-weight:800;color:#111827;margin-bottom:4px}
.day-card-sub{font-size:12px;color:#6b7280;font-weight:700}
.report-corp{display:grid;gap:10px}
.report-corp-title{font-size:18px;font-weight:900;color:#111827;padding:4px 2px}
.report-block{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e5e7eb;box-shadow:0 4px 14px rgba(15,23,42,.05)}
.report-block-title{padding:10px 12px;font-size:14px;font-weight:900;background:#f8fafc;border-bottom:1px solid #e5e7eb}
.report-table-wrap{overflow:auto}
.report-table{width:max-content;min-width:100%;border-collapse:collapse;font-size:12px;background:#fff}
.report-table th,.report-table td{border:1px solid #d1d5db;padding:6px 8px;text-align:left;vertical-align:top;white-space:nowrap}
.report-table th{background:#5b8fd1;color:#fff;font-weight:800;position:sticky;top:0}
.report-table td.col-date,.report-table td.col-wo{color:#111827;font-weight:400}
.report-table td.col-date.merged{background:#f8fbff;font-weight:700;vertical-align:middle}
.report-table td.col-export.transfer{background:#fff59d;font-weight:800}
.report-table td.col-inv.has-inv{background:#92d050;font-weight:800}
.modal{position:fixed;inset:0;z-index:1000}
.modal-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.45)}
.modal-content{position:relative;max-width:760px;margin:5vh auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.25);max-height:90vh;display:flex;flex-direction:column}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e5e7eb}
.modal-title{font-size:16px;font-weight:900;color:#111827}
.modal-close{border:0;background:#fff;font-size:26px;line-height:1;cursor:pointer;color:#6b7280}
.modal-body{padding:14px 16px;overflow:auto;background:#fafbfc}
@media(max-width:1024px){
  .app{max-width:100%}
  .calendar-wrap{grid-template-columns:1fr}
  .calendar-day-panel{position:static;top:auto;max-height:none;overflow:visible}
}
@media(max-width:640px){
  .app{max-width:760px}
  .top-tools{align-items:stretch}
  .summary-inline{flex:1 1 100%;max-width:none}
  .search-wrap{flex:1 1 100%;min-width:0}
  .search{width:100%}
  .action-row{align-items:stretch}
  .copy-mail-btn{width:100%}
  .cal-week-grid{max-width:none}
  .cal-cell{min-height:72px}
  .calendar{gap:8px}
  .modal-content{margin:0;max-width:none;height:100vh;max-height:none;border-radius:0}
  .report-table th,.report-table td{font-size:11px;padding:5px 6px}
}
@media(max-width:460px){
  .detail-grid{grid-template-columns:1fr}
  .summary-wo,.summary-model{font-size:14px}
  .summary-line{gap:8px}
  .date-range{flex-wrap:wrap}
  .cal-item{font-size:9px}
}

    }).join('');
    return `<div class="report-corp"><div class="report-corp-title">${esc(corp)} · ${corpGroups[corp].length}건</div>${blocks}</div>`;
  }).join('')||'<div class="empty">조건에 맞는 데이터가 없습니다.</div>';
}
function buildMailReportHtml(items){
  if(!items.length) return '<div>조건에 맞는 데이터가 없습니다.</div>';
  const corpGroups=items.reduce((a,i)=>{(a[i.corp]=a[i.corp]||[]).push(i);return a;},{});
  const cellBase='border:1px solid #cfd6df;padding:6px 8px;font-size:12px;line-height:1.35;text-align:left;vertical-align:top;white-space:nowrap;';
  const thStyle=cellBase+'background:#5b8fd1;color:#ffffff;font-weight:700;';
  const titleStyle='font-size:18px;font-weight:700;margin:18px 0 8px 0;color:#111827;';
  const blockStyle='font-size:14px;font-weight:700;margin:12px 0 6px 0;color:#111827;';
  let html='<div style="font-family:Malgun Gothic, Apple SD Gothic Neo, Noto Sans KR, Arial, sans-serif;color:#111827;">';
  reportCorpOrder.filter(c=>corpGroups[c]&&corpGroups[c].length).forEach(corp=>{
    html+=`<div style="${titleStyle}">${esc(corp)} · ${corpGroups[corp].length}건</div>`;
    const deptGroups=corpGroups[corp].reduce((a,item)=>{const dep=((item.depart||'').trim())||'기타';(a[dep]=a[dep]||[]).push(item);return a;},{});
    const extraDeps=Object.keys(deptGroups).filter(d=>!reportDepartOrder.includes(d)).sort();
    [...reportDepartOrder,...extraDeps].filter(d=>deptGroups[d]&&deptGroups[d].length).forEach(dep=>{
      const rows=[...deptGroups[dep]].sort(compareReportDateTime);
      const cols=getReportColumns(corp);
      const dateKey='shipDateText';
      const dateCounts={};
      const datePrinted={};
      rows.forEach(item=>{const k=String(item[dateKey]||'');dateCounts[k]=(dateCounts[k]||0)+1;});
      html+=`<div style="${blockStyle}">${esc(dep)} · ${rows.length}건</div>`;
      html+='<table style="border-collapse:collapse;border-spacing:0;margin:0 0 16px 0;width:auto;max-width:none;">';
      html+='<thead><tr>';
      cols.forEach(c=>{html+=`<th style="${thStyle}">${esc(c.label)}</th>`;});
      html+='</tr></thead><tbody>';
      rows.forEach(item=>{
        html+='<tr>';
        cols.forEach(c=>{
          let style=cellBase;
          if(c.key==='shipDateText'||c.key==='wo') style+='color:#111827;font-weight:400;';
          if(c.key==='shipDateText') style+='background:#f8fbff;font-weight:700;vertical-align:middle;';
          if(c.key==='exportInfo'&&item.shipType==='이관') style+='background:#fff59d;font-weight:700;';
          if(c.key==='inv'&&String(item.inv||'').trim()) style+='background:#92d050;font-weight:700;';
          if(c.key===dateKey){
            const k=String(item[dateKey]||'');
            if(!datePrinted[k]){
              datePrinted[k]=1;
              const rowspan=Math.max(dateCounts[k]||1,1);
              html+=`<td style="${style}" rowspan="${rowspan}">${esc(showVal(item[c.key]))}</td>`;
            }
          }else{
            html+=`<td style="${style}">${esc(showVal(item[c.key]))}</td>`;
          }
        });
        html+='</tr>';
      });
      html+='</tbody></table>';
    });
  });
  html+='</div>';
  return html;
}
function buildMailReportText(items){
  if(!items.length) return '조건에 맞는 데이터가 없습니다.';
  const lines=[];
  const corpGroups=items.reduce((a,i)=>{(a[i.corp]=a[i.corp]||[]).push(i);return a;},{});
  reportCorpOrder.filter(c=>corpGroups[c]&&corpGroups[c].length).forEach(corp=>{
    lines.push(`${corp} · ${corpGroups[corp].length}건`);
    const deptGroups=corpGroups[corp].reduce((a,item)=>{const dep=((item.depart||'').trim())||'기타';(a[dep]=a[dep]||[]).push(item);return a;},{});
    const extraDeps=Object.keys(deptGroups).filter(d=>!reportDepartOrder.includes(d)).sort();
    [...reportDepartOrder,...extraDeps].filter(d=>deptGroups[d]&&deptGroups[d].length).forEach(dep=>{
      const rows=[...deptGroups[dep]].sort(compareReportDateTime);
      const cols=getReportColumns(corp);
      let prevDate='';
      lines.push(`  ${dep} · ${rows.length}건`);
      lines.push('  '+cols.map(c=>c.label).join(vbTabSafe()));
      rows.forEach(item=>{
        const vals=cols.map(c=>{
          if(c.key==='shipDateText'){
            const cur=showVal(item[c.key]);
            if(cur===prevDate) return '';
            prevDate=cur;
            return cur;
          }
          return showVal(item[c.key]);
        });
        lines.push('  '+vals.join(vbTabSafe()));
      });
      lines.push('');
    });
    lines.push('');
  });
  return lines.join('\n');
}
function vbTabSafe(){return '\t';}
async function copyMailReport(){
  const items=filteredData();
  if(!items.length){alert('복사할 데이터가 없습니다.');return;}
  const html=buildMailReportHtml(items);
  const text=buildMailReportText(items);
  const original=copyMailReportBtn.textContent;
  copyMailReportBtn.disabled=true;
  try{
    if(window.ClipboardItem&&navigator.clipboard&&navigator.clipboard.write){
      const item=new ClipboardItem({
        'text/html':new Blob([html],{type:'text/html'}),
        'text/plain':new Blob([text],{type:'text/plain'})
      });
      await navigator.clipboard.write([item]);
    }else if(navigator.clipboard&&navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
    }else{
      const ta=document.createElement('textarea');
      ta.value=text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
    copyMailReportBtn.textContent='복사완료';
    setTimeout(()=>{copyMailReportBtn.textContent=original;copyMailReportBtn.disabled=false;},1200);
  }catch(err){
    copyMailReportBtn.disabled=false;
    copyMailReportBtn.textContent=original;
    alert('복사에 실패했습니다. 브라우저 권한 또는 보안설정을 확인해주세요.');
  }
}
function renderMainView(items){
  const isCalendar=state.view==='calendar',isReport=state.view==='report';
  listEl.classList.toggle('hidden',isCalendar||isReport);
  reportEl.classList.toggle('hidden',!isReport);
  calToolbar.classList.toggle('hidden',!isCalendar);
  calWrap.classList.toggle('hidden',!isCalendar);
  if(isCalendar) renderCalendar(items); else if(isReport) renderReport(items); else renderList(items);
}
function renderAll(){
  const items=filteredData();
  renderViewTabs();renderCorpTabs();renderModeTabs();renderFilterTabs();
  const summaryHtml=`<div class="summary-card"><div class="summary-label">전체 예정 건수</div><div class="summary-value">${items.length}</div></div>`;
  summaryEl.innerHTML='';
  summaryInlineEl.innerHTML=summaryHtml;
  toggleAdvancedFiltersBtn.textContent=state.advancedOpen?'상세 필터 닫기':'상세 필터 열기';
  advancedFiltersEl.classList.toggle('hidden',!state.advancedOpen);
  renderMainView(items);
}
searchInput.addEventListener('input',e=>{state.keyword=e.target.value;renderAll();});
dateFromEl.addEventListener('change',e=>{state.dateFrom=e.target.value;renderAll();});
dateToEl.addEventListener('change',e=>{state.dateTo=e.target.value;renderAll();});

$('prevMonth').addEventListener('click',()=>{state.calendarMonth--;if(state.calendarMonth<0){state.calendarMonth=11;state.calendarYear--;}state.selectedDate='';renderAll();});

modalBackdrop.addEventListener('click',closeDetailModal);
modalClose.addEventListener('click',closeDetailModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!detailModal.classList.contains('hidden'))closeDetailModal();});
renderAll();
</script></body></html>
