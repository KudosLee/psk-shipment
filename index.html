<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>출하 현황 조회</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:#f3f5f8;color:#1f2937}
.app{max-width:760px;margin:0 auto;min-height:100vh;background:#f3f5f8}
.header{position:sticky;top:0;z-index:10;background:rgba(243,245,248,.96);backdrop-filter:blur(8px);padding:14px 14px 10px;border-bottom:1px solid #e5e7eb}
.title{font-size:20px;font-weight:800;margin:0 0 4px}
.subtitle{margin:0;font-size:13px;color:#6b7280}
.summary{display:grid;gap:8px;padding:12px 14px 0}
.summary-card{background:#fff;border-radius:14px;padding:12px 10px;box-shadow:0 4px 14px rgba(15,23,42,.06);text-align:center}
.summary-label{font-size:11px;color:#6b7280;margin-bottom:6px}
.summary-value{font-size:20px;font-weight:800}
.controls{padding:12px 14px;display:grid;gap:10px}
.search{width:100%;border:1px solid #d1d5db;border-radius:14px;padding:13px 14px;font-size:15px;background:#fff}
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
.tab{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:999px;padding:10px 14px;font-size:14px;font-weight:700;white-space:nowrap;cursor:pointer;flex:0 0 auto}
.tab.active{background:#111827;color:#fff;border-color:#111827}
.list{padding:0 14px 18px}
.date-divider{font-size:16px;font-weight:800;color:#374151;padding:10px 2px 6px}
.item{background:#fff;border-radius:16px;margin-bottom:10px;box-shadow:0 4px 14px rgba(15,23,42,.06);overflow:hidden;border:1px solid #eef2f7}
.item-head{width:100%;border:0;background:#fff;padding:14px;text-align:left;cursor:pointer}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.badge-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.corp-badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800}
.corp-psk{background:#dbeafe;color:#1d4ed8}.corp-holdings{background:#fef3c7;color:#b45309}
.mode-badge{display:inline-block;background:#ede9fe;color:#6d28d9;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800}
.vendor-badge{display:inline-block;background:#f0fdf4;color:#15803d;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800}
.summary-line{display:flex;align-items:center;gap:10px;min-width:0;flex:1;flex-wrap:wrap}
.summary-wo{font-size:15px;font-weight:900;color:#111827;flex:0 0 auto}
.summary-sep{color:#cbd5e1;font-weight:700;flex:0 0 auto}
.summary-model{font-size:14px;color:#1f2937;font-weight:700;min-width:0}
.summary-customer{font-size:13px;color:#6b7280;font-weight:700;min-width:0}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px}
.pill{background:#f3f4f6;color:#374151;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}
.arrow{font-size:18px;color:#9ca3af;transition:transform .2s ease;flex:0 0 auto}
.summary-main{min-width:0;flex:1}.summary-main *{word-break:break-word}
.item.open .arrow{transform:rotate(180deg)}
.detail{display:none;border-top:1px solid #eef2f7;background:#fafbfc;padding:12px 14px 14px}
.item.open .detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
.field{min-width:0}.field-label{font-size:11px;color:#6b7280;margin-bottom:3px;font-weight:700}
.field-value{font-size:13px;color:#111827;font-weight:700;word-break:break-word;line-height:1.4}
.empty{background:#fff;border-radius:16px;padding:32px 18px;text-align:center;color:#6b7280;box-shadow:0 4px 14px rgba(15,23,42,.06)}
.date-range{display:flex;align-items:center;gap:8px}
.date-input{border:1px solid #d1d5db;border-radius:10px;padding:9px 10px;font-size:14px;background:#fff;color:#374151;flex:1;min-width:0}
.date-sep{color:#9ca3af;font-weight:700;flex:0 0 auto}
.date-reset{border:1px solid #d1d5db;background:#fff;color:#6b7280;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;flex:0 0 auto;white-space:nowrap}
.hidden{display:none !important}
.calendar-toolbar{display:flex;align-items:center;justify-content:space-between;padding:0 14px 10px;gap:10px}
.calendar-title{font-size:18px;font-weight:800;color:#111827}
.nav-btn{border:1px solid #d1d5db;background:#fff;border-radius:10px;padding:8px 12px;font-size:14px;font-weight:800;cursor:pointer}
.calendar-wrap{padding:0 12px 18px;display:grid;gap:12px}
.calendar{display:grid;gap:12px}
.cal-week-block{display:block}
.cal-week-grid{display:grid;gap:6px;max-width:620px;width:100%;margin:0 auto}
.cal-weekday{background:#e5e7eb;color:#374151;border-radius:10px;padding:8px 4px;text-align:center;font-size:11px;font-weight:800}
.cal-cell{background:#fff;border:1px solid #e5e7eb;border-radius:14px;min-height:78px;padding:6px;display:flex;flex-direction:column;gap:5px;cursor:pointer;box-shadow:0 4px 14px rgba(15,23,42,.04)}
.cal-cell.empty{background:transparent;border:0;box-shadow:none;cursor:default}
.cal-cell.selected{border:2px solid #111827}
.cal-day{font-size:12px;font-weight:800;color:#111827}
.cal-count{font-size:11px;font-weight:700;color:#2563eb}
.cal-items{display:flex;flex-direction:column;gap:4px;min-width:0}
.cal-item{background:#f3f4f6;border-radius:8px;padding:4px 5px;font-size:10px;font-weight:700;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.calendar-day-panel{background:#fff;border-radius:16px;padding:14px;box-shadow:0 4px 14px rgba(15,23,42,.06);border:1px solid #eef2f7}
.day-panel-title{font-size:15px;font-weight:800;margin-bottom:10px;color:#111827}
.day-list{display:grid;gap:8px}
.day-card{border:1px solid #e5e7eb;background:#fafafa;border-radius:12px;padding:10px;cursor:pointer}
.day-card-title{font-size:13px;font-weight:800;color:#111827;margin-bottom:4px}
.day-card-sub{font-size:12px;color:#6b7280;font-weight:700}
.modal{position:fixed;inset:0;z-index:1000}
.modal-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.45)}
.modal-content{position:relative;max-width:760px;margin:5vh auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.25);max-height:90vh;display:flex;flex-direction:column}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e5e7eb}
.modal-title{font-size:16px;font-weight:900;color:#111827}
.modal-close{border:0;background:#fff;font-size:26px;line-height:1;cursor:pointer;color:#6b7280}
.modal-body{padding:14px 16px;overflow:auto;background:#fafbfc}
@media(max-width:640px){.cal-week-grid{max-width:none}.cal-cell{min-height:72px}.calendar{gap:8px}.modal-content{margin:0;max-width:none;height:100vh;max-height:none;border-radius:0}}
@media(max-width:460px){.detail-grid{grid-template-columns:1fr}.summary-wo,.summary-model{font-size:14px}.summary-line{gap:8px}.date-range{flex-wrap:wrap}.cal-item{font-size:9px}}
</style></head><body>

function filteredData(){
  const kw=state.keyword.trim().toLowerCase();
  return data.filter(item=>{
    if(state.corp!=='전체 법인'&&item.corp!==state.corp) return false;
    if(state.mode!=='전체'&&item.shipMode!==state.mode) return false;
    if(state.filter!=='전체'){
      if(categorySet.has(state.filter)){if(item.category!==state.filter) return false;}
      else if(item.vendorName!==state.filter) return false;

    if(state.dateFrom&&d&&d<state.dateFrom) return false;

      const hasSat=week.some(x=>x.wd===6&&x.items.length>0);
      const hasSun=week.some(x=>x.wd===0&&x.items.length>0);
      const cols=['월','화','수','목','금'];
      if(hasSat) cols.push('토');
      if(hasSun) cols.push('일');
      html+=`<div class="cal-week-block"><div class="cal-week-grid" style="grid-template-columns:repeat(${cols.length},1fr)">`;
      html+=cols.map(n=>`<div class="cal-weekday">${n}</div>`).join('');
      const map={1:null,2:null,3:null,4:null,5:null,6:null,0:null};
      week.forEach(x=>{map[x.wd]=x;});
      [1,2,3,4,5].forEach(k=>{
        const x=map[k];
        if(x){
          html+=`<div class="cal-cell ${state.selectedDate===x.ds?'selected':''}" data-date="${x.ds}"><div class="cal-day">${x.day}</div>${x.items.length?`<div class="cal-count">${x.items.length}건</div>`:''}<div class="cal-items">${x.items.slice(0,2).map(it=>`<div class="cal-item">${esc(it.wo||'-')} - ${esc(it.shipType||'-')} - ${esc(it.shipMode||'-')}</div>`).join('')}</div></div>`;
        }else{
          html+=`<div class="cal-cell empty"></div>`;
        }
      });
      if(hasSat){
        const x=map[6];
        if(x){
          html+=`<div class="cal-cell ${state.selectedDate===x.ds?'selected':''}" data-date="${x.ds}"><div class="cal-day">${x.day}</div>${x.items.length?`<div class="cal-count">${x.items.length}건</div>`:''}<div class="cal-items">${x.items.slice(0,2).map(it=>`<div class="cal-item">${esc(it.wo||'-')} - ${esc(it.shipType||'-')} - ${esc(it.shipMode||'-')}</div>`).join('')}</div></div>`;
        }else{
          html+=`<div class="cal-cell empty"></div>`;
        }
      }
      if(hasSun){
        const x=map[0];
        if(x){
          html+=`<div class="cal-cell ${state.selectedDate===x.ds?'selected':''}" data-date="${x.ds}"><div class="cal-day">${x.day}</div>${x.items.length?`<div class="cal-count">${x.items.length}건</div>`:''}<div class="cal-items">${x.items.slice(0,2).map(it=>`<div class="cal-item">${esc(it.wo||'-')} - ${esc(it.shipType||'-')} - ${esc(it.shipMode||'-')}</div>`).join('')}</div></div>`;
        }else{
          html+=`<div class="cal-cell empty"></div>`;
        }
      }
      html+=`</div></div>`;
      week=[];
    }
  }
  calEl.innerHTML=html;
  calTitleEl.textContent=`${y}년 ${m+1}월`;
  calEl.querySelectorAll('.cal-cell[data-date]').forEach(c=>c.addEventListener('click',()=>{state.selectedDate=c.dataset.date;renderAll();}));
  renderCalendarDayPanel(items);
}
function renderCalendarDayPanel(items){
  if(!state.selectedDate){calDayPanel.innerHTML='<div class="day-panel-title">날짜를 선택하세요</div>';return;}
  const rows=sortByLoadTime(items.filter(item=>item.shipDate===state.selectedDate));
  if(!rows.length){calDayPanel.innerHTML=`<div class="day-panel-title">${esc(state.selectedDate)}</div><div class="empty">선택한 날짜의 데이터가 없습니다.</div>`;return;}
  calDayPanel.innerHTML=`<div class="day-panel-title">${esc(state.selectedDate)} · ${rows.length}건</div><div class="day-list">${rows.map((item,i)=>`<div class="day-card" data-idx="${i}"><div class="day-card-title">${esc(item.wo||'-')} | ${esc(item.model||'-')}</div><div class="day-card-sub">${esc(item.customer||'-')} · ${esc(item.corp||'-')} · ${esc(item.shipMode||'-')}</div><div class="day-card-sub">상차지: ${esc(item.depart||'-')} · 상차시간: ${esc(item.loadTime||'-')}</div></div>`).join('')}</div>`;
  calDayPanel.querySelectorAll('.day-card').forEach(c=>c.addEventListener('click',()=>openDetailModal(rows[Number(c.dataset.idx)])));
}
function openDetailModal(item){modalBody.innerHTML=renderItemDetail(item);detailModal.classList.remove('hidden');document.body.style.overflow='hidden';}
function closeDetailModal(){detailModal.classList.add('hidden');modalBody.innerHTML='';document.body.style.overflow='';}
function renderMainView(items){
  if(state.view==='list'){listEl.classList.remove('hidden');calToolbar.classList.add('hidden');calWrap.classList.add('hidden');renderList(items);}
  else{listEl.classList.add('hidden');calToolbar.classList.remove('hidden');calWrap.classList.remove('hidden');renderCalendar(items);}
}
function renderAll(){const items=filteredData();renderViewTabs();renderCorpTabs();renderModeTabs();renderFilterTabs();summaryEl.innerHTML=`<div class="summary-card"><div class="summary-label">전체 예정 건수</div><div class="summary-value">${items.length}</div></div>`;renderMainView(items);}
searchInput.addEventListener('input',e=>{state.keyword=e.target.value;renderAll();});
dateFromEl.addEventListener('change',e=>{state.dateFrom=e.target.value;renderAll();});
dateToEl.addEventListener('change',e=>{state.dateTo=e.target.value;renderAll();});
dateResetEl.addEventListener('click',()=>{state.dateFrom='';state.dateTo='';dateFromEl.value='';dateToEl.value='';renderAll();});
$('prevMonth').addEventListener('click',()=>{state.calendarMonth--;if(state.calendarMonth<0){state.calendarMonth=11;state.calendarYear--;}state.selectedDate='';renderAll();});
$('nextMonth').addEventListener('click',()=>{state.calendarMonth++;if(state.calendarMonth>11){state.calendarMonth=0;state.calendarYear++;}state.selectedDate='';renderAll();});
modalBackdrop.addEventListener('click',closeDetailModal);
modalClose.addEventListener('click',closeDetailModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!detailModal.classList.contains('hidden'))closeDetailModal();});
renderAll();
</script></body></html>
